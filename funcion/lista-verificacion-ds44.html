<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Verificación · DS N°44 · SST</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f1419;
    --ink-soft: #2d3542;
    --muted: #6b7280;
    --paper: #faf8f3;
    --paper-pure: #fefdf9;
    --line: #d7d0bf;
    --line-soft: #ebe5d3;
    --accent: #0b4d3d;
    --accent-light: #e8f1ed;
    --ok: #15803d;
    --ok-bg: #ecfdf5;
    --no: #b91c1c;
    --no-bg: #fef2f2;
    --na: #a16207;
    --na-bg: #fefce8;
    --fuf: #7c2d12;
    --fuf-bg: #fef7ed;
    --shadow: 0 1px 2px rgba(15,20,25,0.04), 0 2px 8px rgba(15,20,25,0.04);
    --shadow-lg: 0 4px 16px rgba(15,20,25,0.08), 0 2px 4px rgba(15,20,25,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'IBM Plex Sans', -apple-system, sans-serif;
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body {
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 20% 0%, rgba(11,77,61,0.03) 0%, transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(124,45,18,0.02) 0%, transparent 50%);
  }

  /* TIPOGRAFÍA */
  .serif { font-family: 'Fraunces', Georgia, serif; font-optical-sizing: auto; }
  .mono { font-family: 'IBM Plex Mono', monospace; }

  /* LAYOUT PRINCIPAL */
  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: 100vh;
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--paper-pure);
    border-right: 1px solid var(--line);
    padding: 28px 24px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .brand {
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line-soft);
  }

  .brand-mark {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .brand-title {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 600;
    line-height: 1.15;
    color: var(--ink);
    font-variation-settings: "opsz" 40;
    letter-spacing: -0.01em;
  }

  .brand-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Progreso global */
  .progress-block {
    background: linear-gradient(135deg, var(--accent) 0%, #0d6b54 100%);
    color: #fff;
    border-radius: 4px;
    padding: 18px 18px 20px;
    position: relative;
    overflow: hidden;
  }

  .progress-block::before {
    content: "";
    position: absolute;
    right: -30px; top: -30px;
    width: 120px; height: 120px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  .progress-block::after {
    content: "";
    position: absolute;
    right: -60px; top: -60px;
    width: 180px; height: 180px;
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 50%;
  }

  .progress-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.75;
    margin-bottom: 6px;
  }

  .progress-value {
    font-family: 'Fraunces', serif;
    font-size: 42px;
    font-weight: 500;
    line-height: 1;
    font-variation-settings: "opsz" 72;
    letter-spacing: -0.03em;
  }

  .progress-value sup {
    font-size: 18px;
    font-weight: 400;
    opacity: 0.7;
    margin-left: 2px;
  }

  .progress-meta {
    font-size: 12px;
    opacity: 0.85;
    margin-top: 4px;
  }

  .progress-bar {
    margin-top: 14px;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: #fff;
    transition: width .5s cubic-bezier(0.16,1,0.3,1);
  }

  /* Navegación de secciones */
  .nav-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
    padding: 0 4px;
  }

  .nav-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .nav-item {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 10px 10px 10px 6px;
    border-radius: 3px;
    cursor: pointer;
    border: none;
    background: transparent;
    text-align: left;
    width: 100%;
    font-family: inherit;
    transition: background .15s;
    border-left: 2px solid transparent;
  }
  .nav-item:hover { background: var(--line-soft); }
  .nav-item.active {
    background: var(--accent-light);
    border-left-color: var(--accent);
  }
  .nav-item.active .nav-letter { color: var(--accent); }

  .nav-letter {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 16px;
    color: var(--ink-soft);
    font-variation-settings: "opsz" 36;
  }

  .nav-title {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.3;
  }

  .nav-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    display: flex;
    gap: 3px;
    align-items: center;
  }

  .nav-pill {
    display: inline-block;
    min-width: 18px;
    text-align: center;
    padding: 1px 4px;
    border-radius: 2px;
    font-size: 9px;
    background: var(--line-soft);
    color: var(--ink-soft);
  }
  .nav-pill.ok { background: var(--ok-bg); color: var(--ok); }
  .nav-pill.no { background: var(--no-bg); color: var(--no); }

  /* MAIN */
  .main {
    padding: 36px 48px 80px;
    max-width: 1080px;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 24px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--line-soft);
  }

  .topbar-left .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .topbar-left h1 {
    font-family: 'Fraunces', serif;
    font-size: 34px;
    font-weight: 500;
    line-height: 1.1;
    letter-spacing: -0.02em;
    font-variation-settings: "opsz" 72;
    color: var(--ink);
    max-width: 680px;
  }

  .topbar-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn {
    border: 1px solid var(--line);
    background: var(--paper-pure);
    padding: 8px 14px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all .15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { border-color: var(--ink-soft); background: #fff; }
  .btn.primary {
    background: var(--ink);
    color: var(--paper-pure);
    border-color: var(--ink);
  }
  .btn.primary:hover { background: var(--ink-soft); }
  .btn.danger-ghost { color: var(--no); }
  .btn.danger-ghost:hover { border-color: var(--no); }

  /* TABS */
  .tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--line-soft);
  }
  .tab {
    padding: 10px 16px;
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .tab.active {
    color: var(--ink);
    border-bottom-color: var(--ink);
    font-weight: 500;
  }
  .tab:hover:not(.active) { color: var(--ink-soft); }

  /* IDENTIFICACIÓN */
  .id-form {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px 32px;
    max-width: 840px;
  }
  .id-form h2 {
    grid-column: 1 / -1;
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 600;
    margin-top: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--line-soft);
    font-variation-settings: "opsz" 36;
  }
  .id-form h2:first-child { margin-top: 0; }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .field.wide { grid-column: 1 / -1; }

  .field label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .field input, .field textarea {
    border: none;
    border-bottom: 1px solid var(--line);
    background: transparent;
    font-family: inherit;
    font-size: 15px;
    color: var(--ink);
    padding: 6px 0;
    outline: none;
    transition: border-color .15s;
  }
  .field input:focus, .field textarea:focus {
    border-bottom-color: var(--accent);
    border-bottom-width: 2px;
    padding-bottom: 5px;
  }

  /* FILTROS */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    padding: 12px 16px;
    background: var(--paper-pure);
    border: 1px solid var(--line-soft);
    border-radius: 4px;
    align-items: center;
    flex-wrap: wrap;
  }
  .filters .search {
    flex: 1;
    min-width: 200px;
    border: 1px solid var(--line);
    background: var(--paper);
    padding: 7px 10px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 13px;
    outline: none;
  }
  .filters .search:focus { border-color: var(--accent); }

  .chip {
    padding: 6px 12px;
    border: 1px solid var(--line);
    background: var(--paper);
    border-radius: 999px;
    font-size: 12px;
    color: var(--ink-soft);
    cursor: pointer;
    font-family: inherit;
    transition: all .15s;
  }
  .chip:hover { background: var(--line-soft); }
  .chip.active {
    background: var(--ink);
    color: var(--paper-pure);
    border-color: var(--ink);
  }

  /* SECCIÓN */
  .section-header {
    margin: 32px 0 16px;
    display: flex;
    align-items: baseline;
    gap: 14px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--ink);
  }
  .section-letter {
    font-family: 'Fraunces', serif;
    font-size: 56px;
    font-weight: 500;
    line-height: 0.9;
    color: var(--ink);
    font-variation-settings: "opsz" 120;
    letter-spacing: -0.04em;
  }
  .section-title-wrap {
    flex: 1;
  }
  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    line-height: 1.2;
    color: var(--ink);
    font-variation-settings: "opsz" 36;
  }
  .section-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 4px;
  }

  /* TARJETA DE PREGUNTA */
  .question-card {
    background: var(--paper-pure);
    border: 1px solid var(--line-soft);
    border-radius: 4px;
    padding: 20px 22px;
    margin-bottom: 12px;
    transition: all .15s;
    position: relative;
  }
  .question-card:hover {
    border-color: var(--line);
    box-shadow: var(--shadow);
  }
  .question-card.answered-ok { border-left: 3px solid var(--ok); }
  .question-card.answered-no { border-left: 3px solid var(--no); }
  .question-card.answered-na { border-left: 3px solid var(--na); }

  .q-header {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  .q-id {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    background: var(--ink);
    color: var(--paper-pure);
    padding: 3px 8px;
    border-radius: 2px;
    flex-shrink: 0;
    letter-spacing: 0.02em;
  }

  .q-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 2px;
  }

  .tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 2px;
    background: var(--line-soft);
    color: var(--ink-soft);
  }
  .tag.fuf {
    background: var(--fuf-bg);
    color: var(--fuf);
    border: 1px solid rgba(124,45,18,0.2);
  }

  .q-text {
    font-size: 14.5px;
    line-height: 1.55;
    color: var(--ink);
    margin-bottom: 16px;
    white-space: pre-wrap;
  }

  .q-text-limit {
    max-height: 4.65em;
    overflow: hidden;
    position: relative;
    mask-image: linear-gradient(180deg, #000 70%, transparent);
  }
  .q-text-toggle {
    display: block;
    background: none;
    border: none;
    color: var(--accent);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    padding: 4px 0;
    margin-top: -8px;
    margin-bottom: 12px;
  }
  .q-text-toggle:hover { text-decoration: underline; }

  /* RESPUESTAS */
  .answer-group {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }
  .answer-btn {
    flex: 1;
    padding: 10px;
    border: 1px solid var(--line);
    background: var(--paper);
    border-radius: 3px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: var(--ink-soft);
  }
  .answer-btn:hover { border-color: var(--ink-soft); }
  .answer-btn.selected.ok {
    background: var(--ok-bg);
    border-color: var(--ok);
    color: var(--ok);
    font-weight: 500;
  }
  .answer-btn.selected.no {
    background: var(--no-bg);
    border-color: var(--no);
    color: var(--no);
    font-weight: 500;
  }
  .answer-btn.selected.na {
    background: var(--na-bg);
    border-color: var(--na);
    color: var(--na);
    font-weight: 500;
  }
  .answer-icon {
    width: 16px; height: 16px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    border: 1.5px solid currentColor;
  }

  /* DETALLES EXPANDIBLES */
  .details {
    margin-top: 8px;
    padding-top: 14px;
    border-top: 1px dashed var(--line-soft);
  }

  .detail-row {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 14px;
    padding: 8px 0;
    font-size: 13px;
  }
  .detail-row .label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding-top: 2px;
  }
  .detail-row .value {
    color: var(--ink-soft);
    line-height: 1.5;
    white-space: pre-wrap;
  }

  .comment-field {
    width: 100%;
    border: 1px solid var(--line);
    background: var(--paper);
    padding: 8px 10px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 13px;
    resize: vertical;
    min-height: 60px;
    outline: none;
    color: var(--ink);
  }
  .comment-field:focus { border-color: var(--accent); }

  .evidence-field {
    width: 100%;
    border: 1px solid var(--line);
    background: var(--paper);
    padding: 7px 10px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 13px;
    outline: none;
    color: var(--ink);
  }
  .evidence-field:focus { border-color: var(--accent); }

  /* RESULTADOS */
  .results-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--paper-pure);
    border: 1px solid var(--line-soft);
    padding: 20px;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    height: 3px; width: 100%;
    background: var(--ink);
  }
  .stat-card.ok::before { background: var(--ok); }
  .stat-card.no::before { background: var(--no); }
  .stat-card.na::before { background: var(--na); }

  .stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .stat-value {
    font-family: 'Fraunces', serif;
    font-size: 44px;
    font-weight: 500;
    line-height: 1;
    color: var(--ink);
    font-variation-settings: "opsz" 72;
    letter-spacing: -0.03em;
  }
  .stat-card.ok .stat-value { color: var(--ok); }
  .stat-card.no .stat-value { color: var(--no); }
  .stat-card.na .stat-value { color: var(--na); }

  .stat-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Gráfico por sección */
  .section-chart {
    background: var(--paper-pure);
    border: 1px solid var(--line-soft);
    border-radius: 4px;
    padding: 24px;
    margin-bottom: 24px;
  }

  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 20px;
  }
  .chart-title {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 500;
    font-variation-settings: "opsz" 36;
  }
  .chart-legend {
    display: flex;
    gap: 16px;
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }
  .legend-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    margin-right: 5px;
    vertical-align: middle;
  }

  .chart-row {
    display: grid;
    grid-template-columns: 80px 1fr 80px;
    align-items: center;
    gap: 14px;
    padding: 8px 0;
    border-bottom: 1px dotted var(--line-soft);
    font-size: 13px;
  }
  .chart-row:last-child { border-bottom: none; }
  .chart-row .section-code {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    color: var(--ink-soft);
  }
  .chart-row .section-name {
    font-size: 12px;
    color: var(--ink-soft);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .chart-bar {
    display: flex;
    height: 22px;
    border-radius: 2px;
    overflow: hidden;
    background: var(--line-soft);
  }
  .chart-bar-seg {
    transition: flex .3s;
  }
  .chart-bar-seg.ok { background: var(--ok); }
  .chart-bar-seg.no { background: var(--no); }
  .chart-bar-seg.na { background: var(--na); }

  .chart-percentage {
    text-align: right;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
  }

  /* PLAN DE ACCIÓN */
  .plan-intro {
    background: var(--paper-pure);
    border-left: 3px solid var(--no);
    padding: 16px 20px;
    margin-bottom: 20px;
    font-size: 14px;
    color: var(--ink-soft);
  }
  .plan-intro strong { color: var(--ink); }

  .plan-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  .plan-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--paper-pure);
    border: 1px solid var(--line-soft);
    border-radius: 4px;
    overflow: hidden;
    font-size: 13px;
  }
  .plan-table th {
    background: var(--line-soft);
    text-align: left;
    padding: 10px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 600;
  }
  .plan-table td {
    padding: 12px;
    border-top: 1px solid var(--line-soft);
    vertical-align: top;
  }
  .plan-table tr:nth-child(even) td { background: rgba(215,208,191,0.08); }

  .plan-priority {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 2px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .plan-priority.alta { background: var(--no-bg); color: var(--no); }
  .plan-priority.media { background: var(--na-bg); color: var(--na); }
  .plan-priority.baja { background: var(--accent-light); color: var(--accent); }

  .plan-input, .plan-select, .plan-date {
    border: 1px solid transparent;
    background: transparent;
    padding: 4px 6px;
    border-radius: 2px;
    font-family: inherit;
    font-size: 12px;
    width: 100%;
    color: var(--ink);
  }
  .plan-input:hover, .plan-select:hover, .plan-date:hover { border-color: var(--line); }
  .plan-input:focus, .plan-select:focus, .plan-date:focus {
    border-color: var(--accent);
    background: var(--paper);
    outline: none;
  }

  .empty {
    padding: 40px;
    text-align: center;
    color: var(--muted);
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-style: italic;
  }

  /* Introducción */
  .intro-card {
    background: var(--paper-pure);
    border: 1px solid var(--line-soft);
    border-radius: 4px;
    padding: 32px;
    margin-bottom: 20px;
  }
  .intro-card h3 {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 12px;
    font-variation-settings: "opsz" 36;
  }
  .intro-card p {
    font-size: 14.5px;
    line-height: 1.65;
    color: var(--ink-soft);
    margin-bottom: 12px;
  }
  .intro-steps {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    margin-top: 20px;
  }
  .intro-step {
    padding: 14px;
    border: 1px solid var(--line-soft);
    border-radius: 3px;
    position: relative;
  }
  .intro-step .num {
    font-family: 'Fraunces', serif;
    font-size: 32px;
    font-weight: 500;
    color: var(--accent);
    line-height: 1;
    font-variation-settings: "opsz" 72;
  }
  .intro-step h4 {
    font-size: 14px;
    font-weight: 600;
    margin: 6px 0 4px;
  }
  .intro-step p {
    font-size: 12.5px;
    color: var(--muted);
    margin: 0;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--ink);
    color: var(--paper-pure);
    padding: 10px 18px;
    border-radius: 3px;
    font-size: 13px;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    transform: translateY(10px);
    transition: all .25s;
    pointer-events: none;
    z-index: 1000;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* Responsive */
  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar {
      position: static;
      height: auto;
      border-right: none;
      border-bottom: 1px solid var(--line);
    }
    .main { padding: 24px 20px 60px; }
    .topbar { flex-direction: column; }
    .topbar-left h1 { font-size: 26px; }
    .results-grid { grid-template-columns: repeat(2, 1fr); }
    .id-form { grid-template-columns: 1fr; }
    .plan-meta { grid-template-columns: 1fr; }
  }

  /* Print */
  @media print {
    .sidebar, .tabs, .filters, .topbar-actions, .answer-group, .q-text-toggle { display: none !important; }
    .app { grid-template-columns: 1fr; }
    .main { padding: 0; max-width: 100%; }
    .question-card { page-break-inside: avoid; border: 1px solid #ccc !important; box-shadow: none !important; }
    body { background: #fff; }
  }

  /* Scrollbar estilo */
  .sidebar::-webkit-scrollbar { width: 6px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
</style>

<script>

const SECTIONS_DATA = [{"letter":"A","title":"Identificación de peligros y evaluación de riesgos","questions":[{"id":"A.1","question":"¿La entidad empleadora ha elaborado una matriz de identificación de peligros y evaluación de los riesgos laborales asociados a los procesos, tareas y puestos de trabajo (MIPER)?","reference":"FUF / Art. 7 DS 44","control":"La entidad empleadora debe elaborar una matriz de identificación de peligros y evaluación de los riesgos laborales asociados a los procesos, tareas y puestos de trabajo (MIPER)","evidence":"1) Registro de la matriz de identificación de peligros y evaluación de los riesgos laborales asociados a los procesos, tareas y puestos de trabajo de los distintos lugares de trabajo de la entidad empleadora.","isFUF":true},{"id":"A.2","question":"¿La entidad empleadora mantiene la MIPER disponible en los lugares de trabajo e informada a las personas trabajadoras, incluyendo al Comité Paritario, el Delegado de Seguridad y Salud en el Trabajo, y los dirigentes sindicales?","reference":"FUF / Art. 7 DS 44","control":"La entidad empleadora debe mantener la MIPER disponible en los lugares de trabajo e informada a las personas trabajadoras, incluyendo al Comité Paritario, el Delegado de Seguridad y Salud en el Trabajo, y los dirigentes sindicales?","evidence":"1) Registro de comunicación de la matriz de identificación de peligros y evaluación de los riesgos","isFUF":true},{"id":"A.3","question":"¿Para la confección de la MIPER, la entidad empleadora considera la exposición a los agentes y factores de riesgos laborales presentes en el lugar de trabajo, tales como los riesgos ergonómicos, psicosociales, violencia y acoso en el trabajo, accidentes del trabajo y  enfermedades profesionales que se hayan producido, así como los riesgos asociados a los programas de vigilancia ocupacional, integrando un enfoque de género?","reference":"FUF / Art. 7 DS 44","control":"Para la confección de la MIPER, la entidad empleadora debe considerar la exposición a los agentes y factores de riesgos laborales presentes en el lugar de trabajo, tales como los riesgos ergonómicos, psicosociales, violencia y acoso en el trabajo, accidentes del trabajo y  enfermedades profesionales que se hayan producido, así como los riesgos asociados a los programas de vigilancia ocupacional, integrando un enfoque de género","evidence":"1) Registro de la matriz de identificación de peligros y evaluación de riesgos laborales que incluya los agentes y factores de riesgo laborales presentes en el lugar de trabajo, tales como los riesgos ergonómicos, psicosociales, violencia y acoso en el trabajo, accidentes del trabajo y enfermedades profesionales que se hayan producido, así como los riesgos asociados a los programas de vigilancia ocupacional, integrando un enfoque de género.","isFUF":true},{"id":"A.4","question":"¿La MIPER contiene los siguientes elementos mínimos, y éstos se ajustan a los requisitos normativos y técnicos en la materia?\na) La identificación de los peligros del puesto de trabajo;\nb) La evaluación de los riesgos;\nc) Magnitud o el nivel de riesgo, y\nd) Medidas preventivas de control y de emergencias adicionales.","reference":"FUF / Art. 7 DS 44","control":"Para la confección de la MIPER, la entidad empleadora debe considerar al menos los siguientes elementos: a) La identificación de los peligros del puesto de trabajo; b) La evaluación de los riesgos; c) Magnitud o el nivel de riesgo, y d) Medidas preventivas de control y de emergencias adicionales.","evidence":"1) MIPER con elementos mínimos considerados.","isFUF":true},{"id":"A.5","question":"¿La entidad empleadora considera en la MIPER que la identificación de peligros se realice para cada puesto de trabajo, teniendo en cuenta las características de las personas expuestas?","reference":"Art. 7 DS 44","control":"La entidad empleadora debe considerar en la MIPER que la identificación de peligros se realice para cada puesto de trabajo, teniendo en cuenta las características de las personas trabajadoras expuestas.","evidence":"1) Registro de la matriz de identificación de peligros y evaluación de riesgos laborales que considere las características de las personas trabajadoras especialmente sensibles.","isFUF":false},{"id":"A.6","question":"¿La entidad empleadora considera en la MIPER que la evaluación de los riesgos se realice para cada peligro identificado en el lugar de trabajo, con el objetivo de determinar la magnitud o el nivel del riesgo?","reference":"Art. 7 DS 44","control":"La entidad empleadora debe considerar en la MIPER que la evaluación de los riesgos se realice para cada peligro identificado en el lugar de trabajo, con el objetivo de determinar la magnitud o el nivel del riesgo.","evidence":"1) Registro de la matriz de identificación de peligros y evaluación de riesgos laborales, con la determinación de la magnitud o nivel del riesgo.","isFUF":false},{"id":"A.7","question":"¿La entidad empleadora considera en la MIPER que la evaluación de riesgos se realice no solo bajo las condiciones de trabajo actualmente existentes, sino que también bajo aquellas que sean previsibles de ocurrir en el futuro?","reference":"Art. 7 DS 44","control":"La entidad empleadora debe considerar en la MIPER que la evaluación de riesgos se realice no solo bajo las condiciones de trabajo actualmente existentes, sino que también bajo aquellas que sean previsibles de ocurrir en el futuro.","evidence":"1) Registro de la matriz de identificación de peligros y evaluación de riesgos laborales que incluya las condiciones laborales previsibles a futuro.","isFUF":false},{"id":"A.8","question":"¿La entidad empleadora considera en la MIPER que la evaluación de riesgos se realice tomando en cuenta, como mínimo, la probabilidad de que ocurra un daño a la vida y salud de las personas trabajadoras?","reference":"Art. 7 DS 44","control":"La entidad empleadora debe considerar en la MIPER que la evaluación de riesgos se realice tomando en cuenta, como mínimo, la probabilidad de que ocurra un daño a la vida y salud de las personas trabajadoras.","evidence":"1) Registro de la matriz de identificación de peligros y evaluación de riesgos laborales, en la que se valore, como mínimo, el indicador de probabilidad de ocurrencia de daño.","isFUF":false},{"id":"A.9","question":"¿La entidad empleadora considera en la MIPER que la evaluación de riesgos se realice utilizando métodos cuantitativos o cualitativos, basados en metodologías y criterios definidos por la autoridad competente, cuando corresponda?","reference":"Art. 7 DS 44","control":"La entidad empleadora debe considerar en la MIPER que la evaluación de riesgos se realice utilizando métodos cuantitativos o cualitativos, basados en metodologías y criterios definidos por la autoridad competente.","evidence":"1) Registro de la matriz de identificación de peligros y evaluación de los riesgos laborales la cual utilice métodos cuantitativos o cualitativos basados en metodología y criterios definidos por la autoridad competente.","isFUF":false},{"id":"A.10","question":"¿La entidad empleadora considera en la MIPER que la evaluación de riesgos se desarrolle de acuerdo con el procedimiento establecido en la \"Guía Técnica para la identificación y evaluación primaria de riesgos en los ambientes de trabajo\" del Instituto de Salud Pública, o el documento que la reemplace?","reference":"Art. 7 DS 44","control":"La entidad empleadora debe considerar en la MIPER  que la evaluación de riesgos se desarrolle de acuerdo con el procedimiento establecido en la \"Guía Técnica para la identificación y evaluación primaria de riesgos en los ambientes de trabajo\" del Instituto de Salud Pública, o el documento que la reemplace.","evidence":"1) Registro de la matriz de identificación de peligros y evaluación de los riesgos laborales desarrollada de acuerdo con el procedimiento de evaluación de los riesgos laborales de la \"Guía Técnica para la identificación y evaluación primaria de riesgos en los ambientes de trabajo\".","isFUF":false},{"id":"A.11","question":"¿La entidad empleadora, tras el desarrollo de la MIPER, adopta medidas preventivas de control y de emergencia adicionales cuando el riesgo evaluado se considera elevado, alto o grave?","reference":"Art. 7 DS 44","control":"La entidad empleadora tras el desarrollo de la MIPER debe adoptar medidas preventivas de control y de emergencia adicionales cuando el riesgo evaluado se considere elevado, alto o grave.","evidence":"1) Registro de la matriz de identificación de peligros y evaluación de los riesgos laborales con adopción de medidas preventivas de control y de emergencia adicionales que se requieran cuando el riesgo evaluado sea considerado como elevado, alto o grave.","isFUF":false},{"id":"A.12","question":"¿La entidad empleadora garantiza que la MIPER sea conocida por toda la línea de mando incluidos los dirigentes sindicales?","reference":"FUF / Art. 7 DS 44","control":"La entidad empleadora debe comunicar la MIPER desarrollada a toda la línea de mando y dirigentes sindicales","evidence":"1) Registro de comunicación de la MIPER.","isFUF":true},{"id":"A.13","question":"¿La entidad empleadora garantiza que la MIPER tenga fecha de elaboración y  sea revisada al menos anualmente, o cuando cambien las condiciones de trabajo que puedan significar un riesgo adicional para las personas trabajadoras, ocurra un accidente de trabajo, se diagnostique una enfermedad profesional o se genere una situación de riesgo grave e inminente?","reference":"FUF / Art. 7 DS 44","control":"La entidad empleadora debe revisar y/o actualizar la MIPER al menos anualmente, o cuando cambien las condiciones de trabajo que puedan significar un riesgo adicional para las personas trabajadoras, ocurra un accidente de trabajo, se diagnostique una enfermedad profesional o se genere una situación de riesgo grave e inminente.","evidence":"1) Registro de la MIPER actualizada, debe indicar fecha de elaboración.","isFUF":true}]},{"letter":"B","title":"Programa de trabajo en prevención de riesgos laborales","questions":[{"id":"B.1","question":"¿La entidad empleadora elabora o modifica un programa de trabajo preventivo basado en la MIPER, dentro del plazo de 30 días corridos contados desde la confección o actualización de dicha matriz, garantizando que al menos incluya las medidas preventivas y correctivas a implementar, los plazos de ejecución y los responsables de su implementación?","reference":"FUF / Art. 8 DS 44","control":"La entidad empleadora debe elaborar o modificar su programa de trabajo preventivo a partir de la MIPER, dentro del plazo de 30 días corridos contados desde la confección o actualización de dicha matriz","evidence":"1) Registro del programa de trabajo preventivo construido a partir de la MIPER.","isFUF":true},{"id":"B.2","question":"¿El programa de trabajo preventivo de la entidad empleadora contiene al menos lo siguiente?:\na) Las medidas preventivas y correctivas a implementar de acuerdo con lo señalado en la MIPER;\nb) Los plazos de implementación;\nc) Los responsables de implementación;\nd) Las actividades de promoción para prevenir los factores de riesgos asociados al consumo de alcohol y drogas en los lugares de trabajo;\ne) Difusión de un estilo de vida y alimentación saludables.\nf) Actividades para prevenir factores de riesgos asociados a la conducción de vehículos motorizados cuando corresponda.\ng) Fechas de modificaciones y aprobación","reference":"FUF / Art. 8 DS 44","control":"El programa de trabajo preventivo debe considerar en su elaboración al menos lo siguiente:  a) Las medidas preventivas y correctivas a implementar de acuerdo con lo señalado en la MIPER;  b) Los plazos de implementación; c) Los responsables de implementación; d) Las actividades de promoción para prevenir los factores de riesgos asociados al consumo de alcohol y drogas en los lugares de trabajo; e) Difusión de un estilo de vida y alimentación saludables. f) Actividades para prevenir factores de riesgos asociados a la conducción de vehículos motorizados cuando corresponda. g) Fechas de modificaciones y aprobación","evidence":"1) Registro del programa que contenga los puntos anteriores.","isFUF":true},{"id":"B.3","question":"¿La entidad empleadora garantiza que el programa de trabajo preventivo contenga actividades de promoción para prevenir los factores de riesgos asociados al consumo de alcohol y drogas en los lugares de trabajo?","reference":"Art. 8 DS 44","control":"La entidad empleadora debe incluir en el programa de trabajo preventivo actividades de promoción para prevenir los factores de riesgo asociados al consumo de alcohol y drogas en los lugares de trabajo.","evidence":"1) Registro del programa de trabajo preventivo que contenga actividades de promoción para prevenir los factores de riesgos asociados al consumo de alcohol y drogas en los lugares de trabajo.","isFUF":false},{"id":"B.4","question":"¿La entidad empleadora garantiza que el programa de trabajo preventivo contenga actividades para difundir un estilo de vida y alimentación saludables?","reference":"Art. 8 DS 44","control":"La entidad empleadora debe incorporar al programa de trabajo preventivo, actividades para difundir un estilo de vida y alimentación saludables","evidence":"1) Registro del programa de trabajo preventivo que contenga actividades para difundir un estilo de vida y alimentación saludables.","isFUF":false},{"id":"B.5","question":"¿La entidad empleadora garantiza que el programa de trabajo preventivo contenga actividades para prevenir los factores de riesgo asociados a la conducción de vehículos motorizados, conforme a la normativa legal y técnica vigente en la materia?","reference":"Art. 8 DS 44","control":"La entidad empleadora debe incorporar al programa de trabajo preventivo, actividades a implementar, a fin de prevenir los factores de riesgos asociados a la conducción de vehículos motorizados, conforme a la normativa legal y técnica vigente en la materia","evidence":"1) Registro del programa de trabajo preventivo que contenga actividades a implementar, a fin de prevenir los factores de riesgos asociados a la conducción de vehículos motorizados, conforme a la normativa legal y técnica vigente en la materia","isFUF":false},{"id":"B.6","question":"¿La entidad empleadora garantiza que el programa de trabajo preventivo conste por escrito y sea aprobado por su representante legal, con indicación de la fecha de aprobación y de sus modificaciones?","reference":"FUF / Art. 8 DS 44","control":"La entidad empleadora debe garantizar que el programa de trabajo preventivo conste por escrito y sea aprobado por su representante legal, indicando la fecha de su aprobación y de sus modificaciones","evidence":"1) Registro del programa de trabajo preventivo documentado por escrito y aprobado por el representante legal.","isFUF":true},{"id":"B.7","question":"¿La entidad empleadora garantiza que el programa de trabajo preventivo se difunda a través de avisos o información fácilmente visible en los lugares de trabajo, o bien mediante los correos electrónicos disponibles de las personas trabajadoras, conforme a la ley, y que se remita un ejemplar al Comité Paritario?","reference":"FUF / Art. 8 DS 44","control":"La entidad empleadora debe difundir el programa de trabajo preventivo a través de avisos o información fácilmente visible en los lugares de trabajo, o bien mediante los correos electrónicos disponibles de las personas trabajadoras, conforme a la ley, remitiendo un ejemplar al Comité Paritario.","evidence":"1) Registro de difusión del programa de trabajo preventivo.","isFUF":true},{"id":"B.8","question":"¿La entidad empleadora dispone de acciones para controlar y vigilar el cumplimiento de las medidas de seguridad y salud establecidas, según la periodicidad y en los casos definidos en el programa de trabajo preventivo?","reference":"Art. 8 DS 44","control":"La entidad empleadora debe establecer acciones para controlar y vigilar el cumplimiento de las medidas de seguridad y salud adoptadas, conforme a la periodicidad y los casos definidos en el programa de trabajo preventivo, pudiendo ejecutarse estas mediante inspecciones en los lugares de trabajo o, de forma remota, utilizando medios electrónicos adecuados.","evidence":"1) Registro del programa de trabajo preventivo con las acciones definidas para controlar y vigilar el cumplimiento de las medidas de SST del programa.","isFUF":false},{"id":"B.9","question":"¿La entidad empleadora asegura que las medidas preventivas y correctivas incluidas en el programa de trabajo preventivo, destinadas a controlar los riesgos laborales, se encuentren priorizadas según el nivel de protección que ofrecen a las personas trabajadoras?","reference":"Art. 8 DS 44","control":"La entidad empleadora debe revisar y ajustar las medidas preventivas y correctivas del programa de trabajo preventivo, asegurando que estén priorizadas según su mayor o menor nivel de protección para las personas trabajadoras. El orden de priorización debe ser el siguiente:\n\n1) Evitar o eliminar los riesgos.\n2) Controlar los riesgos en su fuente a través de medidas de ingeniería o técnicas.\n3) Reducir los riesgos al mínimo posible a través de medidas organizacionales o administrativas, que incluyan la implementación de métodos de trabajo seguro.\n4) Proveer y promover la utilización de elementos de protección personal adecuados mientras persista una situación de riesgo residual, sin perjuicio de haberse aplicado una o más de las medidas mencionadas anteriormente en el orden indicado.","evidence":"1) Registro del programa de trabajo preventivo con los ajustes de medidas preventivas de acuerdo al nuevo orden de priorización.","isFUF":false},{"id":"B.10","question":"¿La entidad empleadora informa de manera adecuada y oportuna a las personas trabajadoras expuestas sobre los riesgos derivados del uso de máquinas, equipos y elementos de trabajo, proporcionándoles las instrucciones necesarias para un manejo seguro y garantizando que su uso no represente un riesgo para quienes los operan (cuando corresponda)?","reference":"FUF / Art. 10 DS 44","control":"La entidad empleadora debe informar de manera adecuada y oportuna a las personas trabajadoras expuestas sobre los riesgos derivados del uso de máquinas, equipos y elementos de trabajo, proporcionándoles las instrucciones necesarias para un manejo seguro y garantizando que su uso no represente un riesgo para quienes los operan.","evidence":"1) Registro documentado con el detalle de los riesgos laborales asociados al uso de máquinas, equipos y elementos de trabajo, incluyendo instrucciones específicas para su manejo adecuado y seguro.","isFUF":true},{"id":"B.11","question":"¿La entidad empleadora dispone de un procedimiento de trabajo seguro para el uso de máquinas, equipos y herramientas que puedan generar riesgos de atrapamiento, cortes, lesiones y/o amputaciones?","reference":"FUF / Art. 10 DS 44","control":"La entidad empleadora debe establecer un procedimiento de trabajo seguro para máquinas, equipos y herramientas que puedan generar riesgos de atrapamiento, corte, lesión y/o amputación","evidence":"1) Procedimiento documentado de trabajo seguro para el uso de máquinas, equipos y herramientas que puedan generar riesgos de atrapamiento, cortes, lesiones y/o amputaciones.","isFUF":true},{"id":"B.12","question":"¿La entidad empleadora dispone de un procedimiento de trabajo seguro para el uso de máquinas, equipos y herramientas que puedan generar riesgos de atrapamiento, corte, lesión y/o amputación, y que incluya, como mínimo, un programa preventivo de operación y mantenimiento, el control constante de su funcionamiento y la implementación de protecciones adecuadas?","reference":"FUF / Art. 10 DS 44","control":"La entidad empleadora debe establecer un procedimiento de trabajo seguro para máquinas, equipos y herramientas que puedan generar riesgos de atrapamiento, corte, lesión y/o amputación, que incluya, como mínimo, un programa preventivo de operación y mantenimiento, el control constante de su funcionamiento y la implementación de protecciones adecuadas.","evidence":"1) Procedimiento de trabajo seguro documentado para máquinas, equipos y herramientas que puedan generar riesgo de atrapamiento, corte, lesión y/o amputación.","isFUF":true},{"id":"B.13","question":"¿La entidad empleadora tiene en cuenta la situación de las personas trabajadoras especialmente sensibles a determinados riesgos laborales, con el fin de implementar las medidas de protección específicas que ellas requieran?","reference":"Art. 11 DS 44","control":"La entidad empleadora debe identificar las personas trabajadoras especialmente sensibles a determinados riesgos laborales, e implementar las medidas de protección específicas que ellas requieran.","evidence":"1) Registro del programa de trabajo preventivo con las acciones definidas para las personas trabajadoras especialmente sensibles a determinados riesgos laborales.","isFUF":false},{"id":"B.14","question":"¿La entidad empleadora adopta medidas de prevención de los riesgos laborales del programa de trabajo preventivo que privilegien el uso de mecanismos o equipos de protección colectiva para las personas trabajadoras, por sobre el uso de elementos de protección personal considerando la prelación de las medidas?","reference":"FUF / Art. 12 DS 44","control":"La entidad empleadora debe revisar y ajustar las medidas de prevención de los riesgos laborales del programa de trabajo preventivo, privilegiando el uso de mecanismos o equipos de protección colectiva de las personas trabajadoras por sobre el uso de elementos de protección personal","evidence":"1) Registro del programa de trabajo preventivo que incluya las indicaciones sobre la prioridad del uso de mecanismos o equipos de protección colectiva de las personas trabajadoras, por encima del uso de elementos de protección personal.","isFUF":true},{"id":"B.15","question":"¿La entidad empleadora proporciona, sin costo alguno, a sus personas trabajadoras los elementos de protección personal adecuados para cubrir los riesgos correspondientes (cuando aplique), y sobre el riesgo residual?","reference":"FUF / Art. 13 DS 44","control":"La entidad empleadora debe proporcionar, sin costo alguno, a sus personas trabajadoras los elementos de protección personal adecuados para cubrir los riesgos correspondientes.","evidence":"1) Registro de entrega de elementos de protección personal, conforme a los riesgos a cubrir.","isFUF":true},{"id":"B.16","question":"¿La entidad empleadora dispone de un procedimiento que contemple la utilización, mantenimiento y reposición o recambio de los elementos de protección personal y que además cumplan con las normas vigentes de certificación de calidad o encontrarse registrados en el Instituto de Salud Pública de Chile?","reference":"FUF / Art. 13 DS 44","control":"La entidad empleadora debe desarrollar un procedimiento que contemple la utilización, mantenimiento y reposición o recambio de los elementos de protección personal los cuales deben estar cumpliendo con las normas vigentes de certificación de calidad o encontrarse registrados en el Instituto de Salud Pública de Chile.","evidence":"1) Procedimiento documentado sobre la utilización y mantenimiento de elementos de protección personal, así como su reposición o recambio.\n2) Certificados de calidad de los elementos de protección personal.","isFUF":true},{"id":"B.17","question":"¿La entidad empleadora dispone de un programa de capacitación para las personas trabajadoras sobre el uso y mantenimiento de los elementos de protección personal, con una duración mínima de una hora cronológica, que incluya contenidos sobre las partes que componen los elementos de protección personal, su colocación, limitaciones de uso, limpieza, almacenamiento y prueba de chequeo diario?","reference":"FUF / Art. 13 DS 44","control":"La entidad empleadora debe desarrollar e implementar un programa de capacitación para las personas trabajadoras sobre el uso y mantenimiento de los elementos de protección personal, con una duración mínima de una hora cronológica. Este programa debe incluir, al menos, la identificación de las partes que componen el elemento de protección personal, su colocación, limitaciones de uso, procedimientos de limpieza, almacenamiento adecuado y la realización de pruebas de chequeo diario.","evidence":"1) Registro de capacitación, con los siguientes antecedentes:\n\ni. Indicación de si la actividad es teórica y/o práctica.\nii. Listado de asistentes con nombre y Rut.\niii. Identificación de los relatores.\niv. Resultados de las evaluaciones de aprendizaje.\nv. Detalle de actividades de reforzamiento realizadas.","isFUF":true},{"id":"B.18","question":"¿La entidad empleadora asegura que el programa de capacitación sobre el uso y mantención de los elementos de protección personal se refuerce anualmente, y cada vez que ingresen nuevas personas trabajadoras, o ante cambios en el tipo de elementos a utilizar?","reference":"FUF / Art. 13 DS 44","control":"La entidad empleadora debe reforzar anualmente la capacitación para las personas trabajadoras sobre el uso y mantención de los elementos de protección personal, y cada vez que una nueva persona trabajadora ingrese a las labores respectivas o que deba cambiar el tipo de elementos de protección personal a utilizar","evidence":"1) Registro de capacitación, con los siguientes antecedentes:\n\ni. Indicación de si la actividad es teórica y/o práctica.\nii. Listado de asistentes con nombre y Rut.\niii. Identificación de los relatores.\niv. Resultados de las evaluaciones de aprendizaje.\nv. Detalle de actividades de reforzamiento realizadas.","isFUF":true},{"id":"B.19","question":"¿La entidad empleadora realiza, al menos anualmente, una evaluación del cumplimiento del programa de trabajo preventivo, evaluando la eficacia de las acciones programadas y estableciendo las medidas de mejora continua que se requieran?","reference":"FUF / Art. 14 DS 44","control":"La entidad empleadora debe realizar, al menos anualmente, una evaluación del cumplimiento del programa de trabajo preventivo, evaluando la eficacia de las acciones programadas y estableciendo las medidas de mejora continua que se requieran","evidence":"1) Registro de evaluación del cumplimiento del programa de trabajo preventivo.","isFUF":true}]},{"letter":"C","title":"Mapas de Riesgos","questions":[{"id":"C.1","question":"¿La entidad empleadora mantiene en sus dependencias mapas de riesgos que permitan localizar y visualizar los principales riesgos a los que están expuestos las personas trabajadoras. Los que deben considerar al menos: \n1) Un dibujo o esquema del lugar de trabajo, y 2) Indicar, a través de símbolos, los principales riesgos existentes en el lugar de trabajo conforme sean determinados en la matriz de identificación de peligros y evaluación de riesgos?","reference":"FUF / Art. 62 DS 44","control":"La entidad empleadora debe mantener en sus dependencias los mapas de riesgos que permitan localizar y visualizar los principales riesgos a los que están expuestos las personas trabajadoras. Los que deben considerar al menos\n1) Un dibujo o esquema del lugar de trabajo.\n2) Indicación, a través de símbolos, los principales riesgos existentes en el lugar de trabajo conforme sean determinados en la matriz de identificación de peligros y evaluación de riesgos.\nLa entidad empleadora debe desarrollar los mapas de riesgos basado en la guía técnica del Ministerio del Trabajo y Previsión Social","evidence":"1) Copia del o los mapas de riesgos actualizados, que reflejen los principales riesgos identificados y evaluados en la matriz de riesgos, ubicados en un lugar visible y de fácil acceso para todas las personas trabajadoras. Estos mapas deben ser elaborados siguiendo las directrices de la guía técnica del Ministerio del Trabajo y Previsión Social.","isFUF":true},{"id":"C.2","question":"¿La entidad empleadora garantiza que los mapas de riesgos estén disponibles para las personas trabajadoras en sitios visibles de cada lugar de trabajo?","reference":"FUF / Art. 62 DS 44","control":"La entidad empleadora debe mantener disponible en sitios visibles en cada lugar de trabajo los mapas de riesgos diseñados.","evidence":"1) Informe fotográfico con la ubicación del o los mapas de riesgos del lugar de trabajo.","isFUF":true}]},{"letter":"D","title":"Información y formación en seguridad y salud en el trabajo","questions":[{"id":"D.1","question":"¿La entidad empleadora garantiza que cada persona trabajadora, antes de iniciar sus labores, reciba información oportuna y adecuada sobre los riesgos inherentes a su actividad, las medidas preventivas y los métodos o procedimientos de trabajo correctos, de acuerdo con la matriz de riesgos y el programa de trabajo preventivo, considerando al menos:\n\n1. Las características mínimas que debe reunir el lugar de trabajo en el que se ejecutarán las labores, entre ellas:\na. Espacio de trabajo.\nb. Condiciones ambientales del puesto de trabajo.\nc. Condiciones de orden y aseo exigidas en el puesto de trabajo.\nd.  Máquinas y herramientas de trabajo que se deberán emplear. \n\n2. Los riesgos a los que podrían estar expuestas, y las respectivas medidas preventivas, incluidos los riesgos y las medidas derivados de emergencias, catástrofes y desastres.  \n\n3. Procedimientos de trabajo seguro..\n\n4. Las características de los productos y sustancias que se manipularán, incluyendo:\na. Nombre, sinónimos, fórmula, aspecto y olor.\nb. Modo de empleo y límites de exposición permisibles.\nc. Almacenamiento, uso de elementos de protección personal y medidas de primeros auxilios, conforme a la ficha técnica de seguridad y etiquetado?","reference":"FUF / Art. 15 DS 44","control":"La entidad empleadora debe informar a cada persona trabajadora previo al inicio de sus trabajos acerca de los riesgos que entrañan sus labores, de las medidas preventivas y los métodos o procedimientos de trabajo correctos, determinados conforme a la matriz de riesgos y el programa de trabajo preventivo, considerando a lo menos:\n\n1. Las características mínimas que debe reunir el lugar de trabajo en el que se ejecutarán las labores, entre ellas:\na. Espacio de trabajo.\nb. Condiciones ambientales del puesto de trabajo.\nc. Condiciones de orden y aseo exigidas en el puesto de trabajo.\nd.  Máquinas y herramientas de trabajo que se deberán emplear. \n\n2. Los riesgos a los que podrían estar expuestas, y las respectivas medidas preventivas, incluidos los riesgos y las medidas derivados de emergencias, catástrofes y desastres.  \n\n3. Procedimientos de trabajo seguro..\n\n4. Las características de los productos y sustancias que se manipularán, incluyendo:\na. Nombre, sinónimos, fórmula, aspecto y olor.\nb. Modo de empleo y límites de exposición permisibles.\nc. Almacenamiento, uso de elementos de protección personal y medidas de primeros auxilios, conforme a la ficha técnica de seguridad y etiquetado.","evidence":"1) Registro de cumplimiento de la entrega de Informar los Riesgos Laborales. (IRL)","isFUF":true},{"id":"D.2","question":"¿La entidad empleadora capacita, de forma teórica o práctica, a las personas trabajadoras sobre las principales medidas de seguridad y salud necesarias para desempeñar sus labores, considerando un enfoque de género y con una periodicidad no superior a dos años. Además, garantiza que la capacitación se desarrolle por medio de un curso de al menos 8 horas de duración, dictado por una entidad acreditada, en la cual se aborden los siguientes temas:\n\n1) Factores de riesgo presentes en los lugares de trabajo.\n2) Efectos en la salud derivados de la exposición a factores de riesgos, incluyendo información sobre enfermedades profesionales vinculadas a las actividades realizadas.\n3) Medidas preventivas para controlar los riesgos identificados y evaluados en las tareas asignadas.\n4) Prestaciones médicas y económicas disponibles según la Ley N° 16.744, los procedimientos para acceder a ellas y los centros asistenciales correspondientes en caso de accidentes laborales o enfermedades profesionales.\n5) Plan de gestión de riesgos ante emergencias, catástrofes o desastres de la entidad empleadora.\n6) Señaléticas en los lugares de trabajo.\n7) Prevención de riesgos de incendio, incluyendo el uso de extintores y otros mecanismos de extinción de incendios?","reference":"FUF / Art. 16 DS 44","control":"La entidad empleadora debe capacitar de forma teórica o práctica, a las personas trabajadoras sobre las principales medidas de seguridad y salud necesarias para desempeñar sus labores, considerando un enfoque de género y con una periodicidad no superior a dos años. Además, debe garantizar que la capacitación se desarrolle por medio de un curso de al menos 8 horas de duración, dictado por una entidad acreditada, en la cual se aborden los siguientes temas:\n\n1) Factores de riesgo presentes en los lugares de trabajo.\n2) Efectos en la salud derivados de la exposición a factores de riesgos, incluyendo información sobre enfermedades profesionales vinculadas a las actividades realizadas.\n3) Medidas preventivas para controlar los riesgos identificados y evaluados en las tareas asignadas.\n4) Prestaciones médicas y económicas disponibles según la Ley N° 16.744, los procedimientos para acceder a ellas y los centros asistenciales correspondientes en caso de accidentes laborales o enfermedades profesionales.\n5) Plan de gestión de riesgos ante emergencias, catástrofes o desastres de la entidad empleadora.\n6) Señaléticas en los lugares de trabajo.\n7) Prevención de riesgos de incendio, incluyendo el uso de extintores y otros mecanismos de extinción de incendios?","evidence":"1) Registro de las capacitaciones teóricas o prácticas realizadas a las personas trabajadoras, impartidas por una entidad acreditada y con una duración mínima de 8 horas","isFUF":true}]},{"letter":"E","title":"Consulta y participación de las personas trabajadoras","questions":[{"id":"E.1","question":"¿La entidad empleadora promueve la consulta y participación de los representantes de las personas trabajadoras, cuando se prevean cambios en los procesos o en la estructura organizacional de la entidad empleadora que puedan poner en riesgo grave la vida y salud de quienes los ejecuten, así como en las medidas adoptadas para controlarlo o mitigarlo?      \nNotas:\n- Se Consulta al Comité Paritario de Higiene y Seguridad, cuando ante los cambios en los procesos de trabajo.\n- La entidad empleadora deberá promover la participación de las personas trabajadoras y sus representantes, sea directamente o a través del Comité Paritario y el Departamento de Prevención de Riesgos Profesionales, en la investigación las causas de accidentes del trabajo o se diagnostique una enfermedad profesional.","reference":"FUF / Art. 17 DS 44","control":"La entidad empleadora debe promover la consulta y participación de los representantes de las personas trabajadoras, cuando se prevean cambios en los procesos o en la estructura organizacional de la entidad empleadora que puedan poner en riesgo grave la vida y salud de quienes los ejecuten, así como en las medidas adoptadas para controlarlo o mitigarlo","evidence":"1) Registro de reunión o de las actividades de participación y consulta, con acta de las personas trabajadoras participantes y los temas tratados","isFUF":true},{"id":"E.2","question":"¿La entidad empleadora instruye a las organizaciones sindicales para que promuevan acciones de difusión y capacitación en materia de seguridad y salud dirigidas a las personas trabajadoras?","reference":"FUF / Art. 17 DS 44","control":"La entidad empleadora debe instruir a las organizaciones sindicales para que promuevan la realización de acciones de difusión y capacitación de las personas trabajadoras en materia de seguridad y salud","evidence":"1) Registro de las actividades de promoción de acciones de difusión y capacitación de las personas trabajadoras en materia de seguridad y salud.","isFUF":true}]},{"letter":"F","title":"Riesgo Grave e Inminente y Plan de Gestión para la reducción de riesgos de emergencias, catástrofes o desastres","questions":[{"id":"F.1","question":"¿La entidad empleadora asegura que, ante la ocurrencia de un riesgo grave e inminente para la vida o la salud de las personas trabajadoras, se informe de manera inmediata a todas las personas afectadas sobre la existencia del riesgo, las medidas adoptadas para eliminarlo o reducirlo, la suspensión inmediata de las actividades involucradas y la evacuación de las áreas afectadas, cuando así lo ordene la autoridad competente?","reference":"FUF / Art. 18 DS 44","control":"La entidad empleadora debe informar inmediatamente a todas las personas trabajadoras afectadas sobre la existencia de un riesgo grave e inminente, la suspensión inmediata de las actividades involucradas y la evacuación de las áreas afectadas, cuando así lo ordene la autoridad competente.","evidence":"1) Plan de gestión, reducción y respuesta de los riesgos en caso de emergencias, catástrofes o desastres, el que debe incorporar el procedimiento ante riesgos graves e inminentes, la suspensión de las actividades relacionadas y su evacuación.","isFUF":true},{"id":"F.2","question":"¿La entidad empleadora cuenta con uno o más planes de gestión, reducción y respuesta de los riesgos en caso de emergencias, catástrofes o desastres u otros eventos o incidentes conocidos?","reference":"FUF / Art. 19 DS 44","control":"La entidad empleadora debe diseñar e implementar en los lugares de trabajo uno o más planes de gestión, reducción y respuesta de los riesgos en caso de emergencias, catástrofes o desastres u otros eventos o incidentes conocidos","evidence":"1) Plan de gestión, reducción y respuesta de los riesgos en caso de emergencias, catástrofes o desastres.","isFUF":true},{"id":"F.3","question":"¿Se realiza a lo menos una vez al año pruebas de ensayo del o los planes de gestión, reducción y respuesta frente a los riesgos de emergencias, catástrofe o desastres u otros eventos o incidentes conocidos?","reference":"Art. 19 DS 44","control":"La entidad empleadora debe al menos una vez al año pruebas de ensayo del o los planes de gestión, reducción y respuesta frente a los riesgos de emergencias, catástrofe o desastres u otros eventos o incidentes conocidos","evidence":"1) Registro de la realización de los ensayos realizados, no deben tener fecha de mas de un año.","isFUF":false},{"id":"F.4","question":"¿La entidad empleadora para efectos de la elaboración del plan de gestión, reducción y respuesta, identifica los riesgos de emergencias, catástrofes o desastres, elaborando y manteniendo al día los planes de respuestas ante ellos?","reference":"Art. 19 DS 44","control":"La entidad empleadora debe identificar los riesgos de emergencias, catástrofes o desastres, elaborando y manteniendo al día los planes de respuestas ante ellos","evidence":"1) Registro de la identificación y evaluación de amenazas potenciales y los planes de respuesta para cada una de las amenazas identificadas.","isFUF":false}]},{"letter":"G","title":"Coordinación y Cooperación de la actividad preventiva de entidades empleadoras","questions":[{"id":"G.1","question":"¿La entidad empleadora cuando presta servicios junto a más entidades empleadoras en el mismo lugar de trabajo, coordina y coopera para la adecuada aplicación de las medidas de seguridad y salud que sean exigibles para la protección de las personas trabajadoras que presten servicios en dicho lugar, garantizando que se informen mutuamente sobre los riesgos laborales existentes, las medidas preventivas adoptadas y de los planes de emergencia, catástrofe o desastre?","reference":"FUF / Art. 20 DS 44","control":"La entidad empleadora debe coordinar y cooperar para la adecuada aplicación de las medidas de seguridad y salud que sean exigibles para la protección de las personas trabajadoras cuando se presta servicios junto a más entidades empleadoras en el mismo lugar de trabajo, informando mutuamente sobre los riesgos laborales existentes, las medidas preventivas adoptadas y de los planes de emergencia, catástrofe o desastre","evidence":"1) Registro de coordinación y cooperación con las otras entidades empleadoras del mismo lugar de trabajo.","isFUF":true}]},{"letter":"H","title":"Sistema de gestión de SST - Entidades empleadoras de más de 25 personas trabajadoras","questions":[{"id":"H.1","question":"¿La entidad empleadora, con más de 25 personas trabajadoras, implementa un Sistema de Gestión de la Seguridad y Salud en el Trabajo (SGSST) que incluya: Política de SST; Estructura organizacional para la gestión preventiva de los riesgos laborales; Diagnóstico, planificación y programación de la actividad preventiva; Evaluación o auditoría periódica del desempeño del SGSST; y Acciones para la promoción de mejoras continuas+B48 o correctivas?","reference":"FUF / Art. 22 DS 44","control":"La entidad empleadora debe implementar un Sistema de Gestión de la Seguridad y Salud en el Trabajo, que contenga: Política de SST; Estructura organizacional para la gestión preventiva de los riesgos laborales; Diagnóstico, planificación y programación de la actividad preventiva; Evaluación o auditoría periódica del desempeño del SGSST; y Acciones para la promoción de mejoras continuas o correctivas.","evidence":"1) Registro documentado de la Política de SST; Estructura organizacional para la gestión preventiva de los riesgos laborales; Diagnóstico, planificación y programación de la actividad preventiva; Evaluación o auditoría periódica del desempeño del SGSST; y Acciones para la promoción de mejoras continuas o correctivas.","isFUF":true},{"id":"H.2","question":"¿La entidad empleadora garantiza que la política de seguridad y salud en el trabajo establece las directrices de los programas y acciones en materia de prevención de riesgos laborales, incluyendo explícitamente el compromiso de proteger la vida y salud de las personas trabajadoras, el cumplimiento de la normativa aplicable en la materia, la participación de los Comités Paritarios y de las personas trabajadoras o sus representantes en los temas de seguridad y salud, la promoción de mecanismos de diálogo y propuestas de mejora continua, con el objetivo de lograr progresivamente un entorno de trabajo seguro y saludable?","reference":"FUF / Art. 22 DS 44","control":"La entidad empleadora debe establecer una política de seguridad y salud en el trabajo con las directrices de los programas y acciones en materia de prevención de riesgos laborales, incluyendo explícitamente el compromiso de proteger la vida y salud de las personas trabajadoras, el cumplimiento de la normativa aplicable en la materia, la participación de los Comités Paritarios y de las personas trabajadoras o sus representantes en los temas de seguridad y salud, la promoción de mecanismos de diálogo y propuestas de mejora continua, con el objetivo de lograr progresivamente un entorno de trabajo seguro y saludable.","evidence":"1) Registro documentados de la Política de SST con los contenidos mínimos establecidos.","isFUF":true},{"id":"H.3","question":"¿La entidad empleadora garantiza que la estructura organizacional para la gestión preventiva de los riesgos laborales define las funciones, interacciones y responsabilidades en los diferentes niveles jerárquicos de la organización, incluyendo las del Comité Paritario, el Departamento de Prevención de Riesgos y de las personas trabajadoras?","reference":"FUF / Art. 22 DS 44","control":"La entidad empleadora debe establecer la estructura organizacional para la gestión preventiva de los riesgos laborales, indicando las funciones, interacciones y responsabilidades en los diferentes niveles jerárquicos de la organización, incluyendo las del Comité Paritario, el Departamento de Prevención de Riesgos y las de las personas trabajadoras.","evidence":"1) Registro documentados de la  estructura organizacional para la gestión preventiva de los riesgos laborales, con los contenidos mínimos establecidos.","isFUF":true},{"id":"H.4","question":"¿La entidad empleadora garantiza que el diagnóstico, la planificación y programación de la actividad preventiva, se basa en el cumplimiento de la normativa vigente y en la matriz de identificación de peligros y evaluación de los riesgos?","reference":"FUF / Art. 22 DS 44","control":"La entidad empleadora debe implementar los procesos necesarios para el desarrollo de un diagnóstico, la planificación y programación de la actividad preventiva, basándose en el cumplimiento de la normativa vigente y en la matriz de identificación de peligros y evaluación de los riesgos","evidence":"1) Registro de la identificación y evaluación de aspectos legales, de la identificación y evaluación de riesgos de SST y del programa de trabajo preventivo.","isFUF":true},{"id":"H.5","question":"¿La entidad empleadora desarrolla evaluación o auditoría periódica del desempeño del Sistema de Gestión de la Seguridad y Salud en el Trabajo?","reference":"FUF / Art. 22 DS 44","control":"La entidad empleadora debe implementar un proceso para la evaluación o auditoría interna del desempeño del Sistema de Gestión de la Seguridad y Salud en el Trabajo","evidence":"1) Registro de auditorias o evaluaciones internas del desempeño del sistema de gestión.","isFUF":true},{"id":"H.6","question":"¿La entidad empleadora garantiza acciones para la promoción de mejoras continuas o correctivas, contando con mecanismos permanentes que aseguren la eficacia de las medidas preventivas adoptadas y su corrección en función de los resultados obtenidos en la evaluación o auditoría periódica?","reference":"FUF / Art. 22 DS 44","control":"La entidad empleadora debe implementar acciones para la promoción de mejoras continuas o correctivas,  definiendo mecanismos permanentes que garanticen la eficacia de las medidas preventivas adoptadas y su corrección en función de los resultados obtenidos en la evaluación o auditoría periódica.","evidence":"1) Registro de acciones que promocionen la permanente mejora continua.","isFUF":true},{"id":"H.7","question":"¿La entidad empleadora considera la participación del CPHS y del Departamento de Prevención de Riesgos en el diseño e implementación del Sistema de Gestión de Seguridad y Salud en el Trabajo?","reference":"FUF / Art. 22 DS 44","control":"La entidad empleadora  debe considerar en el diseño e implementación del Sistema de Gestión de Seguridad y Salud en el Trabajo la participación del CPHS y del Departamento de Prevención de Riesgos.","evidence":"1) Actas de reunión de coordinación sobre el SGSST donde se encuentre al menos un representante del CPHS y del Departamento de Prevención de Riesgos.","isFUF":true}]},{"letter":"I","title":"Sistema de gestión de SST - Entidades empleadoras de hasta 25 personas trabajadoras","questions":[{"id":"I.1","question":"¿La entidad empleadora con hasta 25 personas trabajadoras implementa un Sistema de Gestión de Seguridad y Salud en el Trabajo que incluya una política de SST, una evaluación o diagnóstico, y un programa de trabajo preventivo?","reference":"FUF / Art. 64 DS 44","control":"La entidad empleadora debe diseñar e implementar un Sistema de Gestión de Seguridad y Salud en el Trabajo que incluya una política de SST, una evaluación o diagnóstico, y un programa de trabajo preventivo","evidence":"1) Registro de la Política de SST.\n2) Registro de la evaluación o diagnóstico\n3) Registro del programa de trabajo preventivo.","isFUF":true},{"id":"I.2","question":"¿La entidad empleadora garantiza que la política de seguridad y salud en el trabajo refleje su compromiso con la protección de la vida y la salud de las personas trabajadores, el cumplimiento de la normativa aplicable y la mejora continua?","reference":"FUF / Art. 64 DS 44","control":"La entidad empleadora debe desarrollar la política de seguridad y salud en el trabajo la cual establezca el compromiso de la entidad empleadora con la protección de la vida y salud de las personas trabajadoras, el cumplimiento de la normativa aplicable en la materia y la mejora continua","evidence":"1) Registro documentados de la Política de SST con los contenidos mínimos establecidos.","isFUF":true},{"id":"I.3","question":"¿La entidad empleadora realiza la identificación y evaluación de las condiciones ambientales, psicosociales y ergonómicas, así como del cumplimiento normativo correspondiente?","reference":"FUF / Art. 64 DS 44","control":"La entidad empleadora debe realizar la identificación y evaluación de las condiciones ambientales, psicosociales y ergonómicas, así como garantizar el cumplimiento normativo correspondiente.","evidence":"1) Registro de la  identificación y evaluación de las condiciones ambientales, psicosociales y ergonómicas, y el cumplimiento normativo.","isFUF":true},{"id":"I.4","question":"¿La entidad empleadora elabora una matriz de identificación de peligros y evaluación de riesgos, considerando los resultados de la identificación y evaluación de las condiciones ambientales, psicosociales y ergonómicas, así como el cumplimiento normativo correspondiente?","reference":"FUF / Art. 64 DS 44","control":"La entidad empleadora debe elaborar una matriz de identificación de peligros y evaluación de riesgos, teniendo en cuenta los resultados de la identificación y evaluación de las condiciones ambientales, psicosociales y ergonómicas, así como el cumplimiento normativo correspondiente.","evidence":"1) Registro de la matriz de identificación y evaluación de riesgos de SST.","isFUF":true},{"id":"I.5","question":"¿La entidad empleadora garantiza que la matriz de identificación de peligros y evaluación de riesgos es revisada anualmente o cada vez que cambien las condiciones de trabajo, ocurra un accidente del trabajo, se diagnostique una enfermedad profesional, o se genere una situación de riesgo grave e inminente?","reference":"FUF / Art. 64 DS 44","control":"La entidad empleadora debe revisar la matriz de identificación de peligros y evaluación de riesgos, de manera planificada anualmente o cada vez que cambien las condiciones de trabajo, ocurra un accidente del trabajo, se diagnostique una enfermedad profesional,  o se genere una situación de riesgo grave e inminente","evidence":"1) Registro de la revisión de la matriz de identificación de peligros y evaluación de riesgos de SST.","isFUF":true},{"id":"I.6","question":"¿La entidad empleadora ha elaborado el programa de trabajo preventivo, incorporando las medidas preventivas que se deben adoptar para el control de los riesgos y las acciones que se deben considerar para su implementación, conteniendo como mínimo:  a)  Peligros y riesgos identificados en el puesto de trabajo específico, b)  Las medidas preventivas y correctivas, con precisión de las inmediatas, c) Plazos de ejecución, d)  Responsables, e)  Obligaciones de la persona trabajadora en su implementación, f)  Medidas y periodicidad de control de la implementación de las medidas preventivas o correctivas, y g)      Periodicidad de las capacitaciones?","reference":"FUF / Art. 64 DS 44","control":"La entidad empleadora debe desarrollar el programa de trabajo preventivo, incorporando las medidas preventivas que se deben adoptar para el control de los riesgos y las acciones que se deben considerar para su implementación, conteniendo como mínimo:  a)  Peligros y riesgos identificados en el puesto de trabajo específico, b)  Las medidas preventivas y correctivas, con precisión de las inmediatas, c) Plazos de ejecución, d)  Responsables, e)  Obligaciones de la persona trabajadora en su implementación, f)  Medidas y periodicidad de control de la implementación de las medidas preventivas o correctivas, y g)      Periodicidad de las capacitaciones","evidence":"1) Registro del programa de trabajo preventivo","isFUF":true}]},{"letter":"J","title":"Departamento de prevención de riesgos / Encargado de prevención de riegsos laborales","questions":[{"id":"J.1","question":"Si la entidad empleadora cuenta con más de 100 personas trabajadoras, ¿posee un Departamento de prevención de riesgos, dirigido por un experto en prevención de riesgos?","reference":"FUF / Art. 50 DS 44","control":"Si la entidad empleadora cuenta con más de 100 personas trabajadoras debe conformar el Departamento de prevención de riesgos, dirigido por un experto en prevención de riesgos de categoría técnico o profesional dependiendo de las características de la organización.","evidence":"1) Copia del contrato de trabajo del encargado o jefe del departamento de prevención de riesgos.","isFUF":true},{"id":"J.2","question":"¿La entidad empleadora proporciona todos los medios y el personal necesario para dar cumplimiento a sus funciones y desarrollar las actividades programadas por el Departamento de prevención de riesgos, basándose en las funciones establecidas en el artículo 52 del DTO 44?","reference":"FUF / Art. 51 DS 44","control":"La entidad empleadora debe proporcionar todos los medios y el personal necesario para dar cumplimiento a las funciones y desarrollar las actividades programadas por el Departamento de prevención de riesgos, instruyéndoles sobre el cumplimiento de las funciones establecidas en el artículo 52 del DTO 44.","evidence":"1) Registro del plan de actividades del Departamento de prevención de riesgos y el descriptor de funciones de los integrantes del mismo departamento.","isFUF":true},{"id":"J.3","question":"¿La entidad empleadora garantiza que el Departamento de prevención de riesgos, señale los requerimientos o recursos para su cumplimiento, las principales metas a cumplir, los responsables de cada una de ellas y la forma de evaluar el cumplimiento de los objetivos propuestos considerando sus funciones?","reference":"FUF / Art. 52 DS 44","control":"La entidad empleadora debe instruir al Departamento de prevención de riesgos, respecto a la definición de objetivos y metas a cumplir, los responsables de cada una de ellas y la forma de evaluar su cumplimiento y demostrando que cumple con sus funciones.","evidence":"1) Registro del plan de objetivos y metas de SST.","isFUF":true},{"id":"J.4","question":"¿La entidad empleadora garantiza que el Departamento de prevención de riesgos, cumpla con informar mensualmente por escrito sobre el avance del programa trabajo preventivo y las medidas implementadas para su ejecución, además de elaborar un informe anual con la evaluación de los resultados de la gestión preventiva de la entidad empleadora con copia al CPHS?","reference":"Art. 52 DS 44","control":"La entidad empleadora debe instruir al Departamento de prevención de riesgos para que reporte mensualmente por escrito el avance del programa de trabajo preventivo y las medidas implementadas para su ejecución. Asimismo, debe garantizar la elaboración de un informe anual que evalúe los resultados de la gestión preventiva de la entidad empleadora, el cual debe ir en copia el CPHS.","evidence":"1) Registro mensual del avance del programa de trabajo preventivo.","isFUF":false},{"id":"J.5","question":"¿La entidad empleadora garantiza que el Departamento de prevención de riesgos, sea dirigido por un experto en prevención de riesgos que acredite una experiencia laboral de al menos 12 meses, continuos o discontinuos, en la gestión de riesgos laborales para actividades similares en un periodo no superior a los tres años anteriores al inicio de sus funciones?","reference":"FUF / Art. 53 DS 44","control":"La entidad empleadora debe acreditar que el experto que dirige el Departamento de prevención de riesgos cuenta con al menos 12 meses de experiencia laboral, continuos o discontinuos, en la gestión de riesgos laborales para actividades similares, dentro de un periodo no superior a los tres años previos al inicio de sus funciones.","evidence":"1) Copia del curriculum vitae del encargado o jefe del Departamento de prevención de riesgos.","isFUF":true},{"id":"J.6","question":"Si la entidad empleadora cuenta con hasta 150 personas trabajadoras, ¿
