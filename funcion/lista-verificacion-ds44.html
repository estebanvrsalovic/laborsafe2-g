garantiza que el Departamento de prevención de riesgos, sea dirigido por un experto técnico o profesional en prevención de riesgos? y en caso de contar con más de 150 personas trabajadoras ¿garantiza que sea dirigido por un experto profesional en prevención de riesgos?","reference":"Art. 54 DS 44","control":"La entidad empleadora debe asegurar que el Departamento de prevención de riesgos sea dirigido por un experto técnico o profesional en prevención de riesgos cuando posea hasta 150 personas trabajadoras. En el caso de contar con más de 150 personas trabajadoras, debe ser dirigido por un experto profesional en prevención de riesgos.","evidence":"1) Copia del registro como experto en prevención de riesgos.","isFUF":false},{"id":"J.7","question":"¿La entidad empleadora garantiza que el tiempo de dedicación mínima del experto encargado del Departamento de prevención de riesgos cumple con los criterios establecidos en el artículo 55 del Decreto 44 del MINTRAB?","reference":"FUF / Art. 55 DS 44","control":"La entidad empleadora debe garantizar que el tiempo de dedicación mínima del experto encargado del Departamento de prevención de riesgos, cumple los criterios del artículo 55 del Decreto 44 del MINTRAB.","evidence":"1) Copia del registro de asistencia del encargado o jefe del departamento de prevención de riesgos.","isFUF":true},{"id":"J.8","question":"¿La entidad empleadora adopta las medidas para que el experto en prevención de riesgos lleve un registro semanal fechado con las actividades ejecutadas en el período y el tiempo destinado para el cumplimiento de sus funciones o lleva un registro de asistencia de acuerdo a lo indicado en el artículo 33 del Código del Trabajo?","reference":"Art. 55 DS 44","control":"La entidad empleadora debe adoptar las medidas para que el experto en prevención de riesgos lleve un registro semanal fechado con las actividades ejecutadas en el período y el tiempo destinado para el cumplimiento de sus funciones o lleva un registro de asistencia de acuerdo a lo indicado en el artículo 33 del Código del Trabajo,","evidence":"1) Registro semanal fechado con las actividades ejecutadas en el período.","isFUF":false},{"id":"J.9","question":"¿La entidad empleadora de hasta cien personas trabajadoras ha designado a un Encargado de la prevención de riesgos laborales y este cuenta con la capacitación de su respectivo organismo administrador de la ley N° 16.744?","reference":"FUF / Art. 65 DS 44","control":"La entidad empleadora debe designar un Encargado de la prevención de riesgos laborales y gestionar la capacitación de su respectivo organismo administrador de la ley N° 16.744","evidence":"1) Acta de designación del Encargado de prevención de riesgos laborales de la entidad empleadora.","isFUF":true}]},{"letter":"K","title":"Comité paritario de higiene y seguridad / Delegado de SST","questions":[{"id":"K.1","question":"Si en el centro de trabajo laboran más de 25 personas, ¿se organiza un Comité Paritario de Higiene y Seguridad en dicho centro?","reference":"FUF / Art. 23 DS 44","control":"En el centro de trabajo donde laboren más de 25 personas, se debe organizar un Comité Paritario de Higiene y Seguridad, compuesto por representantes de la entidad empleadora y representantes de las personas trabajadoras, cuyas decisiones adoptadas en el ejercicio de las atribuciones que les encomienda la ley 16.744, serán obligatorias tanto para la empresa como para las personas trabajadoras.","evidence":"1) Acta de elecciones del Comité Paritario de Higiene y Seguridad.\n2)  Acta de constitución del Comité Paritario de Higiene y Seguridad.","isFUF":true},{"id":"K.2","question":"¿Al constituir un Comité Paritario de Higiene y Seguridad, se designan 3 representantes de la entidad empleadora y 3 representantes de las personas trabajadoras, además de un miembro suplente por cada titular?","reference":"Art. 25 DS 44","control":"El centro de trabajo debe tener constituido un Comité Paritario de Higiene y Seguridad compuesto por 12 integrantes: 3 representantes de la entidad empleadora y 3 representantes de las personas trabajadoras, y un suplente por cada miembro titular.","evidence":"1) Acta de elecciones del Comité Paritario de Higiene y Seguridad.\n2)  Acta de constitución del Comité Paritario de Higiene y Seguridad.","isFUF":false},{"id":"K.3","question":"¿El centro de trabajo ha designado a los representantes de la entidad empleadora con 15 días de anticipación a la fecha en que cese en sus funciones el Comité Paritario de Higiene y Seguridad,  y estos nombramientos fueron comunicados a las personas trabajadoras del centro de trabajo?","reference":"Art. 26 DS 44","control":"El centro de trabajo debe designar a los representantes del centro de trabajo con al menos 15 días de anticipación a la fecha en que cese en sus funciones el Comité Paritario de Higiene y Seguridad, y además difundir estos nombramientos por medio de comunicados a las personas trabajadoras.","evidence":"1) Comunicado de los integrantes representantes de la entidad empleadora.","isFUF":false},{"id":"K.4","question":"¿Se realiza la elección del comité por medio de una votación secreta, convocada y presidida por el presidente del actual Comité Paritario de Higiene y Seguridad que termina su período cuya convocatoria fue al menos 15 días antes de las votaciones?","reference":"Art. 27 DS 44","control":"El Comité paritario del centro de trabajo debe realizar las elecciones  mediante votación secreta y directa, convocada y presidida por el actual presidente del comité. Dicha convocatoria debe realizarse con al menos 15 días de antelación a las votaciones, las cuales pueden ser presenciales o remotas.","evidence":"1) Acta de elección del Comité Paritario de Higiene y Seguridad.","isFUF":false},{"id":"K.5","question":"¿Las elecciones del CPHS del Centro de trabajo fueron realizadas al menos 5 días previos al cese del CPHS saliente?","reference":"Art. 28 DS 44","control":"Las elecciones del nuevo CPHS debe realizarse al menos 5 días previos al cese de la gestión del CPHS saliente.","evidence":"1) Acta de elecciones cumpliendo con al menos los 5 días de anticipación.","isFUF":false},{"id":"K.6","question":"¿Fueron elegidos como representantes de las personas trabajadoras las tres primeras mayorías como titulares y las tres siguientes como suplentes de acuerdo a la cantidad de votos obtenidos y dentro de los titulares se encuentran al menos, un trabajador y una trabajadora?","reference":"Art. 29 DS 44","control":"El Comité paritario se debe constituir por personas trabajadoras siendo las tres primeras mayorías como titulares y las tres siguientes como suplentes de acuerdo a la cantidad de votos obtenidos y dentro de los titulares se debe considerar al menos, un trabajador y una trabajadora.","evidence":"1) Acta de elecciones del Comité Paritario de Higiene y Seguridad.\n2)  Acta de constitución del Comité Paritario de Higiene y Seguridad.","isFUF":false},{"id":"K.7","question":"¿Se designan como representantes del centro de trabajo, preferentemente, a personas encargadas de supervisar la ejecución de las labores en la empresa, faena, sucursal o agencia correspondiente, o a quienes los sustituyan, asegurando una participación equitativa entre hombres y mujeres?","reference":"Art. 31 DS 44","control":"Se deben designar como representantes del centro de trabajo, preferentemente, a personas encargadas de supervisar la ejecución de las labores en la empresa, faena, sucursal o agencia correspondiente, o a quienes los sustituyan, asegurando una participación equitativa entre hombres y mujeres.","evidence":"1) Registro de la designación de los representantes del centro de trabajo e indicación de cada cargo.","isFUF":false},{"id":"K.8","question":"¿Se vela para que los representantes de las personas trabajadoras cumplan con los requisitos para ser parte del Comité Paritario de Higiene y Seguridad?","reference":"FUF / Art. 32 DS 44","control":"Los representantes de las personas trabajadoras deben cumplir con los siguientes requisitos:\n\n1) Tener mas de 18 años.\n2) Saber leer y escribir.\n3) Contar con más de un año de antigüedad en el centro de trabajo.\n4) Haber realizado un curso de orientación en prevención de riesgos. (6 meses de plazo desde la fecha de las elecciones)\n5) En el caso del sector público, la persona trabajadora debe estar contratada bajo modalidad de contrata, planta o regida por el Código del Trabajo.\n6) Al menos un representante de las personas trabajadoras y un representante de la entidad empleadora deben haber completado el curso de 20 horas de formación para integrantes del CPHS.","evidence":"1) Registro de los integrantes en donde se indique que todos cumplen los requisitos indicados.","isFUF":true},{"id":"K.9","question":"¿Se elabora un acta de elecciones con toda la información del proceso eleccionario, la cual se envía a la alta dirección del Centro de trabajo y se conserva una copia en los archivos del Comité Paritario de Higiene y Seguridad (CPHS)?","reference":"Art. 33 DS 44","control":"El comité del centro de trabajo debe elaborar un acta de elecciones que incluya al menos la siguiente información:\n\n1) Modalidad de las elecciones (presencial u on-line).\n2) Total de votantes.\n3) Número total de representantes a elegir.\n4) Listado de las personas que obtuvieron votos, ordenado de forma descendente.\n5) Nómina de los representantes electos.\n6) Nombre de la persona con fuero, si corresponde.\n\nEsta acta deberá ser firmada por quien presidió la elección y por las personas elegidas que deseen hacerlo. Una copia debe ser enviada a la entidad empleadora y otra archivada en los registros del Comité Paritario de Higiene y Seguridad (CPHS) correspondiente.","evidence":"1) Acta de elecciones.\n2) Comunicado de aforado a la entidad empleadora.","isFUF":false},{"id":"K.10","question":"¿El centro de trabajo ha elaborado un acta de constitución del CPHS, considerando todo lo definido en cuanto a cargos y equidad de género entre sus integrantes titulares?","reference":"FUF / Art. 35 DS 44","control":"El centro de trabajo debe elaborar un acta de constitución que incluya a los integrantes titulares y suplentes tanto de la entidad empleadora como de las personas trabajadoras. Además, debe especificar al presidente, secretario y a la persona con fuero (si corresponde), considerar si es que hubo algún cambio para cumplir la equidad de género.","evidence":"1) Acta de constitución.","isFUF":true},{"id":"K.11","question":"¿El centro de trabajo ha registrado el acta de constitución en el sitio web institucional de la Dirección del Trabajo dentro de los 15 días hábiles siguientes a la fecha de elección de los representantes de las personas trabajadoras?","reference":"FUF / Art. 36 DS 44","control":"El centro de trabajo debe registrar el acta de constitución en el sitio web institucional de la Dirección del Trabajo dentro de los 15 días hábiles siguientes a la fecha de elección de los representantes de las personas trabajadoras.","evidence":"1) Registro del ingreso a la página de la DT del acta de constitución del CPHS.","isFUF":true},{"id":"K.12","question":"¿El centro de trabajo proporciona las facilidades y adopta las medidas necesarias para garantizar el adecuado funcionamiento del Comité Paritario de Higiene y Seguridad?","reference":"FUF / Art. 37 DS 44","control":"El centro de trabajo debe proporcionar las facilidades y adoptar las siguientes medidas necesarias para asegurar el adecuado funcionamiento del CPHS:\n\n1) Dar las facilidades para que cualquiera de los integrantes del CPHS acompañe al experto en prevención de riesgos de la entidad empleadora, a los especialistas del organismo administrador correspondiente o a los Inspectores del Trabajo, en las visitas y fiscalizaciones realizadas a los lugares de trabajo, con el fin de verificar el cumplimiento de la normativa sobre prevención de riesgos laborales.\n2) Informar oportunamente al CPHS sobre los accidentes de trabajo ocurridos y de las acciones preventivas adoptadas cuando una enfermedad es calificada como de origen laboral.\n3) Coordinar con el CPHS la implementación del programa preventivo de la entidad empleadora.\n4) Consultar al CPHS cuando se prevean cambios en los procesos de trabajo que puedan tener repercusiones graves para la vida o la salud de las personas trabajadoras.\n5) Permitir el libre acceso a los lugares de trabajo a cualquier integrante del Comité para el cumplimiento de sus funciones.","evidence":"1) Registro de participación del CPHS en algunas las actividades mencionadas. Por ejemplo: que el informe donde acudió con el experto a realizar una revisión de temas de SST  indique  que acudió con un  integrante del CPHS; Registro de que el integrante del CPHS participó de una capacitación realizada por Achs; Un registro donde la entidad empleadora da aviso de un accidente, entre otros.","isFUF":true},{"id":"K.13","question":"Si en la entidad empleadora existe un departamento de prevención de riesgos, ¿el experto en prevención de riesgos forma parte, por derecho propio, de los Comités Paritarios de Higiene y Seguridad que existan?","reference":"Art. 38 DS 44","control":"Si en la organización existe un departamento de prevención de riesgos, el experto debe formar parte, por derecho propio, de los Comités Paritarios de Higiene y Seguridad,  sin derecho a voto y con la posibilidad de delegar sus funciones.","evidence":"1) Acta de reunión ordinaria donde se indique la asistencia del experto en prevención.","isFUF":false},{"id":"K.14","question":"¿El CPHS del centro de trabajo se reúne de forma ordinaria una vez al mes, y de forma extraordinaria, cuando sea necesario (en caso de un accidente fatal o grave en el centro de trabajo, cuando exista un riesgo grave e inminente en el lugar de trabajo y cuando un integrante de la entidad empleadora y uno de las personas trabajado así lo solicite)? Además ¿Las reuniones se realizan en horas laborales, considerando como tiempo trabajado el período en que se participe en ellas?","reference":"FUF / Art. 39 DS 44","control":"El Comité Paritario de Higiene y Seguridad del centro de trabajo debe reunirse de forma ordinaria una vez por mes, y de forma extraordinaria, cuando sea necesario (en caso de un accidente fatal o grave en el centro de trabajo, cuando exista un riesgo grave e inminente en el lugar de trabajo y cuando un integrante de la entidad empleadora y uno de las personas trabajado así lo solicite. Las reuniones deben efectuarse en horas de trabajo, considerándose como trabajado el tiempo en ellas empleado. Todas estas reuniones deben quedar registradas en acta.","evidence":"1) Últimas tres actas de las reuniones del Comité Paritario de Higiene y Seguridad.","isFUF":true},{"id":"K.15","question":"¿El Comité Paritario de Higiene y Seguridad del centro de trabajo tiene designados un presidente y un secretario?","reference":"Art. 41 DS 44","control":"El Comité Paritario de Higiene y Seguridad del centro de trabajo debe tener designados un presidente y un secretario.","evidence":"1) Acta de constitución del Comité Paritario de Higiene y Seguridad.","isFUF":false},{"id":"K.16","question":"¿Se envían al centro de trabajo las actas ordinarias / extraordinarias con las medidas preventivas definidas por el CPHS y que debe cumplir la entidad empleadora?","reference":"FUF / Art. 42 DS 44","control":"El CPHS debe enviar a la entidad empleadora el acta con las medidas que debe cumplir en materia de seguridad y salud en el trabajo.","evidence":"1) Acta recepcionada por el centro de trabajo o mail en envío.","isFUF":true},{"id":"K.17","question":"Si la entidad empleadora cuenta con más de 50 personas trabajadoras, ¿se asegura que sus integrantes no permanezcan más de dos períodos consecutivos en el CPHS?","reference":"Art. 43 DS 44","control":"La entidad empleadora con más de 50 personas trabajadoras, debe asegurarse de que ninguno de sus integrantes (titulares y suplentes) permanezca más de dos períodos consecutivos en el CPHS.","evidence":"1) Acta de constitución de los CPHS anteriores.","isFUF":false},{"id":"K.18","question":"¿El CPHS excluye de su constitución a aquellos miembros que dejan de prestar servicios en la respectiva entidad empleadora o que no asistan a dos sesiones consecutivas sin causa justificada?","reference":"Art. 44 DS 44","control":"El CPHS debe excluir de su constitución a aquellos miembros que dejen de prestar servicios en la respectiva entidad empleadora o que no asistan a dos sesiones consecutivas sin causa justificada. Esta acción debe quedar registrada en el acta de la reunión ordinaria.","evidence":"1) Acta de reunión ordinaria.","isFUF":false},{"id":"K.19","question":"¿Los miembros suplentes asisten a las sesiones cuando les corresponde reemplazar a los titulares o cuando son invitados a las reuniones del Comité Paritario de Higiene y Seguridad, y en este último caso, solo con derecho a voz?","reference":"Art. 45 DS 44","control":"El CPHS debe asegurar que los miembros suplentes asistan a las sesiones cuando les corresponda reemplazar a los titulares o cuando sean invitados a participar en las reuniones del Comité Paritario de Higiene y Seguridad, y en este último caso, solo con derecho a voz. Como buena práctica, se recomienda que los suplentes asistan regularmente a las actividades del CPHS.","evidence":"1) Acta de reunión ordinaria.","isFUF":false},{"id":"K.20","question":"¿El centro de trabajo proporciona al CPHS los informes técnicos emitidos por los organismos administradores, la documentación y antecedentes relacionados con la identificación de peligros y la evaluación de riesgos, los planes y programas preventivos, la definición de medidas de control y los procedimientos de trabajo seguro, así como en general toda la documentación sobre prevención de riesgos laborales de la respectiva entidad empleadora?","reference":"FUF / Art. 46 DS 44","control":"El centro de trabajo debe proporcionar al CPHS los informes técnicos emitidos por los organismos administradores, la documentación y antecedentes relacionados con la identificación de peligros y la evaluación de riesgos, los planes y programas preventivos, la definición de medidas de control y los procedimientos de trabajo seguro, así como en general toda la documentación sobre prevención de riesgos laborales con el propósito de que el CPHS pueda hacer gestión de sus funciones, a través del análisis de estos documentos.","evidence":"1) Registro de entrega de los documentos indicados al CPHS.","isFUF":true},{"id":"K.21","question":"¿El CPHS cumple con las funciones indicadas para su gestión a través de las actividades establecidas en el programa de trabajo del Comité Paritario de Higiene y Seguridad?","reference":"FUF / Art. 47 DS 44","control":"El comité del centro de trabajo debe evidenciar, a través de las actividades del programa de trabajo, la ejecución de las siguientes funciones:\n\n1) Asesorar e instruir a las personas trabajadoras sobre la correcta utilización de los instrumentos de protección.\n2) Vigilar el cumplimiento de las medidas de prevención o de seguridad y salud en el trabajo, tanto por parte de las entidades empleadoras como de las personas trabajadoras.\n3) Investigar, con resguardo a la información de carácter sensible o confidencial, las causas de los accidentes de trabajo, enfermedades profesionales, incidentes peligrosos y cualquier otra afección que afecte de forma reiterada o general a los trabajadores, presumiendo que su origen esté relacionado con el uso de productos fitosanitarios, químicos o nocivos para la salud.\n4) Decidir si el accidente de trabajo o la enfermedad profesional, cuyas causas se hayan investigado previamente, se debió o no a negligencia inexcusable de la persona trabajadora, conforme al artículo 70 de la Ley N° 16.744.\n5) Indicar la adopción de todas las medidas de seguridad y salud necesarias para la prevención de los riesgos laborales.\n6) Promover la realización de cursos destinados a la capacitación profesional de las personas trabajadoras en proveedores públicos o privados autorizados para cumplir esta finalidad o en la misma entidad empleadora, faena, sucursal o agencia bajo el control y dirección de tales proveedores.\n7) Informar a la entidad empleadora cuando se detecte un riesgo grave e inminente para la vida o salud de las personas trabajadoras en el lugar de trabajo, para que esta adopte las medidas pertinentes, e informar adecuadamente a las personas trabajadoras sobre los derechos que dicha norma les confiere.\n8) Cumplir con las demás funciones o misiones que le encomiende el organismo administrador respectivo.","evidence":"1) Programa del Comité Paritario de Higiene y Seguridad, en donde se establezcan las acciones relacionadas con las funciones del comité.","isFUF":true},{"id":"K.22","question":"Si existe un CPHS permanente en la entidad empleadora, ¿este ejerce la función de supervisar el funcionamiento de los demás Comités Paritarios de Higiene y Seguridad que se organicen en las distintas faenas, sin descuidar sus propias funciones?","reference":"Art. 49 DS 44","control":"Si existe un CPHS permanente en la entidad empleadora, este debe ejercer la función de supervigilancia sobre el funcionamiento de los demás Comités Paritarios de Higiene y Seguridad que se organicen en las faenas. Esta labor debe realizarse a través de diversas actividades que deben quedar registradas tanto en el programa de trabajo como en el acta de la reunión ordinaria. Además de cumplir con las 8 funciones que le corresponde al CPHS.","evidence":"1) Acta de reunión ordinaria.\n2) Programa de trabajo del CPHS.","isFUF":false},{"id":"K.23","question":"¿El centro de trabajo o faena en que laboren entre 10 y hasta 25 personas trabajadoras y siempre que no funcione un Comité Paritario, cuenta con un Delegado en materia de Seguridad y Salud en el Trabajo y que participe en la implementación del Sistema de Gestión para empresas de menor tamaño y demás intervenciones legales asignadas?","reference":"FUF / Art. 66 DS 44","control":"El centro de trabajo o faena debe realizar la elección del Delegado de Seguridad y Salud en el Trabajo","evidence":"1) Acta de elección del Delegado de SST del lugar de trabajo\n2) Documentación que evidencie la implementación del SGSST","isFUF":true},{"id":"K.24","question":"¿El delegado es elegido por las personas trabajadoras cada 2 años?","reference":"FUF / Art. 66 DS 44","control":"El Delegado debe ser elegido cada 2 años.","evidence":"1) Acta de elección del delegado de SST del lugar de trabajo\nque evidencie la fecha de elección (no puede ser superior a 2 años)","isFUF":true}]},{"letter":"L","title":"Reglamento interno de higiene y seguridad","questions":[{"id":"L.1","question":"¿La entidad empleadora cuenta con un reglamento interno de higiene y seguridad actualizado, cuyo cumplimiento es obligatorio para las personas trabajadoras, y además se proporciona gratuitamente un ejemplar del reglamento a cada persona trabajadora, e ingresado a la página web de la Dirección del Trabajo (DT)?","reference":"FUF / Art. 56 DS 44","control":"La entidad empleadora debe elaborar y mantener vigente el reglamento interno de higiene y seguridad, el cual debe ser entregado de forma gratuita a todas las personas trabajadoras, siendo de cumplimiento obligatorio para ellas.\nNota: Al ser ingresado en página web de la Dirección del Trabajo será considera ingresado en Secretaria Regional Ministerial de Salud","evidence":"1) Reglamento interno de la entidad empleadora vigente.\n2) Registro de envío del reglamento interno a la DT","isFUF":true},{"id":"L.2","question":"¿El Reglamento Interno fue sometido a la consideración del Comité Paritario o del Delegado de Seguridad y Salud en el Trabajo, de las organizaciones sindicales presentes en el lugar de trabajo y de las personas trabajadoras de la entidad empleadora remitiéndoles con al menos 30 días antes de que comience a regir, en formato digital al correo electrónico particular que previamente hayan indicado? Además, ¿el Reglamento Interno es revisado por la entidad empleadora con una periodicidad no inferior a un año, con la participación del Departamento de Prevención de Riesgos o del Comité Paritario, o del Delegado de Seguridad y Salud si existieren, y, en su defecto, con las personas trabajadoras?","reference":"FUF / Art. 57 DS 44","control":"La entidad empleadora debe someter a consideración del Comité Paritario o del Delegado de Seguridad y Salud en el Trabajo, de las organizaciones sindicales presentes en el lugar de trabajo y de las personas trabajadoras, remitiéndoles el reglamento con al menos 30 días de antelación a que comience a regir. Este envío puede realizarse en formato digital al correo electrónico particular que previamente hayan indicado. Asimismo, la entidad empleadora debe revisar el reglamento con una periodicidad no inferior a un año, con la participación del Departamento de Prevención de Riesgos, del Comité Paritario o del Delegado de Seguridad y Salud, si existieren, y, en su defecto, con las personas trabajadoras.","evidence":"1) Reglamento interno de la entidad empleadora vigente.\n2) Registro de envío del reglamento interno a quien corresponda.","isFUF":true},{"id":"L.3","question":"¿La entidad empleadora dispone en su Reglamento Interno que contenga al menos lo siguiente?:\n1. Un preámbulo, en el que se indique el objetivo que persigue el reglamento, el alcance de este y se hará una mención al contenido esencial del artículo 67 de la ley N° 16.744 y al artículo 154 del Código del Trabajo, si correspondiere.\n2. Un capítulo sobre disposiciones generales, que considerará como mínimo:\na) Los procedimientos para exámenes médicos o psicotécnicos del personal, ya sean pre ocupacionales, ocupacionales o aquellos que se realicen al término de la relación laboral o al término de exposición a un riesgo que requiere vigilancia de la salud, según se establezca en el respectivo protocolo dictado por el Ministerio de Salud o en la forma que determine el respectivo organismo administrador de la ley N° 16.744.\nb) Procedimientos de notificación e investigación de los accidentes o enfermedades profesionales.\nc) Facilidades para el funcionamiento del Comité Paritario y del Departamento de Prevención de Riesgos.\nd) Las responsabilidades de las distintas jefaturas y líneas operativas en el cumplimiento de las normas y medidas en materia de prevención de riesgos laborales.\ne) Procedimientos para la selección, uso y mantención de los elementos de protección personal, de conformidad con este reglamento y demás disposiciones legales.\nf) Procedimiento a seguir cuando en el lugar de trabajo sobrevenga un riesgo grave e inminente para la vida y salud de las personas trabajadoras.\ng) Procedimiento para cumplir el plan de gestión de emergencias, catástrofes o desastres.\ncondiciones y entorno de trabajo que puedan afectar la seguridad y salud de las personas trabajadoras, así como del cumplimiento de las normas, protocolos e instrucciones relacionados con tales materias.\ni) Establecimiento de mecanismos que favorezcan la colaboración de la entidad empleadora y de las personas trabajadoras en la prevención de riesgos, y que otorguen un reconocimiento al Comité Paritario, a alguna dependencia de la entidad empleadora o a las personas trabajadoras que formulen propuestas destacadas o relevantes para el mejoramiento de las condiciones de trabajo y del cumplimiento de las medidas preventivas.\nj) Los protocolos de prevención del acoso sexual, laboral y violencia en el trabajo, así como los procedimientos de investigación y sanción de tales conductas, conforme se establece en el Código del Trabajo y normativa complementaria?","reference":"FUF / Art. 58 DS 44","control":"La entidad empleadora debe disponer de su Reglamento Interno el que debe contener al menos lo siguiente:\n1. Un preámbulo, en el que se indique el objetivo que persigue el reglamento, el alcance de este y se hará una mención al contenido esencial del artículo 67 de la ley N° 16.744 y al artículo 154 del Código del Trabajo, si correspondiere.\n2. Un capítulo sobre disposiciones generales, que considerará como mínimo:\na) Los procedimientos para exámenes médicos o psicotécnicos del personal, ya sean pre ocupacionales, ocupacionales o aquellos que se realicen al término de la relación laboral o al término de exposición a un riesgo que requiere vigilancia de la salud, según se establezca en el respectivo protocolo dictado por el Ministerio de Salud o en la forma que determine el respectivo organismo administrador de la ley N° 16.744.\nb) Procedimientos de notificación e investigación de los accidentes o enfermedades profesionales.\nc) Facilidades para el funcionamiento del Comité Paritario y del Departamento de Prevención de Riesgos.\nd) Las responsabilidades de las distintas jefaturas y líneas operativas en el cumplimiento de las normas y medidas en materia de prevención de riesgos laborales.\ne) Procedimientos para la selección, uso y mantención de los elementos de protección personal, de conformidad con este reglamento y demás disposiciones legales.\nf) Procedimiento a seguir cuando en el lugar de trabajo sobrevenga un riesgo grave e inminente para la vida y salud de las personas trabajadoras.\ng) Procedimiento para cumplir el plan de gestión de emergencias, catástrofes o desastres.\ncondiciones y entorno de trabajo que puedan afectar la seguridad y salud de las personas trabajadoras, así como del cumplimiento de las normas, protocolos e instrucciones relacionados con tales materias.\ni) Establecimiento de mecanismos que favorezcan la colaboración de la entidad empleadora y de las personas trabajadoras en la prevención de riesgos, y que otorguen un reconocimiento al Comité Paritario, a alguna dependencia de la entidad empleadora o a las personas trabajadoras que formulen propuestas destacadas o relevantes para el mejoramiento de las condiciones de trabajo y del cumplimiento de las medidas preventivas.\nj) Los protocolos de prevención del acoso sexual, laboral y violencia en el trabajo, así como los procedimientos de investigación y sanción de tales conductas, conforme se establece en el Código del Trabajo y normativa complementaria.","evidence":"1) Reglamento interno de higiene y seguridad (Preámbulo).","isFUF":true},{"id":"L.4","question":"FUF\n¿El Reglamento Interno de la entidad empleadora incluye un capítulo sobre las obligaciones en seguridad y salud en el trabajo, así como todas aquellas normas o disposiciones que las personas trabajadoras deben cumplir para prevenir los riesgos laborales, incluyendo al menos las siguientes?:\n\n1) Cumplir con las instrucciones, reglamentos y demás medidas de seguridad y salud establecidas legalmente, y colaborar con la entidad empleadora en la gestión de los riesgos laborales.\n2) Participar en las actividades preventivas organizadas por la entidad empleadora.\n3) Cooperar y participar en la investigación de los accidentes del trabajo y enfermedades profesionales dispuesta por la entidad empleadora, el Departamento de Prevención de Riesgos, el Comité Paritario, el organismo administrador o las entidades competentes.\n4) Proteger y cuidar los elementos y equipos de protección personal que se les proporcionen, conforme a la normativa vigente.\n5) Usar correctamente y conservar los equipos de trabajo entregados para su uso.\n6) Comunicar los peligros presentes en el lugar de trabajo, así como cualquier desperfecto en los medios de trabajo que pueda afectar la seguridad de las personas trabajadoras.\n7) Informar, en el menor plazo posible, la ocurrencia de situaciones de riesgo grave e inminente que hayan llevado a la interrupción de sus labores.\n8) Notificar oportunamente cualquier síntoma o dolencia que puedan originarse en el ejercicio de sus labores o en las condiciones y entornos de trabajo.\n9) Observar las disposiciones de las normas de tránsito cuando, en el desempeño de sus labores, deban conducir vehículos motorizados.\n10) Colaborar y cumplir con las políticas de prevención y control de los factores de riesgo asociados al consumo de alcohol y drogas en los lugares de trabajo.","reference":"Art. 59 DS 44","control":"La entidad empleadora debe disponer en su Reglamento Interno de un capítulo sobre las obligaciones en seguridad y salud en el trabajo, considerando al menos las siguientes:\n1) Cumplir con las instrucciones, reglamentos y demás medidas de seguridad y salud establecidas legalmente, y colaborar con la entidad empleadora en la gestión de los riesgos laborales.\n2) Participar en las actividades preventivas organizadas por la entidad empleadora.\n3) Cooperar y participar en la investigación de los accidentes del trabajo y enfermedades profesionales dispuesta por la entidad empleadora, el Departamento de Prevención de Riesgos, el Comité Paritario, el organismo administrador o las entidades competentes.\n4) Proteger y cuidar los elementos y equipos de protección personal que se les proporcionen, conforme a la normativa vigente.\n5) Usar correctamente y conservar los equipos de trabajo entregados para su uso.\n6) Comunicar los peligros presentes en el lugar de trabajo, así como cualquier desperfecto en los medios de trabajo que pueda afectar la seguridad de las personas trabajadoras.\n7) Informar, en el menor plazo posible, la ocurrencia de situaciones de riesgo grave e inminente que hayan llevado a la interrupción de sus labores.\n8) Notificar oportunamente cualquier síntoma o dolencia que puedan originarse en el ejercicio de sus labores o en las condiciones y entornos de trabajo.\n9) Observar las disposiciones de las normas de tránsito cuando, en el desempeño de sus labores, deban conducir vehículos motorizados.\n10) Colaborar y cumplir con las políticas de prevención y control de los factores de riesgo asociados al consumo de alcohol y drogas en los lugares de trabajo.","evidence":"1) Reglamento interno de higiene y seguridad (Capítulo de obligaciones).","isFUF":false},{     fecha: '',

  search: '',
  activeSection: null,
  activeTab: 'identificacion'
};

// =====================================================
// PERSISTENCIA (usando state interno, no localStorage)
// Usamos una variable global que persiste mientras la pestaña esté abierta
// =====================================================
function saveState() {
  try {
    // Guardamos en window para que sobreviva re-renderizados
    window.__APP_STATE__ = JSON.stringify(state);
  } catch(e) {}
}
function loadState() {
  try {
    if (window.__APP_STATE__) {
      const loaded = JSON.parse(window.__APP_STATE__);
      state = { ...state, ...loaded };
    }
  } catch(e) {}
}

// =====================================================
// UTILIDADES
// =====================================================
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

function showToast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window.__toastT);
  window.__toastT = setTimeout(() => t.classList.remove('show'), 1800);
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function getAnswer(id) {
  return state.answers[id] || { value: null, comment: '', evidence: '' };
}

function setAnswer(id, patch) {
  state.answers[id] = { ...getAnswer(id), ...patch };
  saveState();
}

// Estadísticas
function getStats() {
  let total = 0, cumple = 0, noCumple = 0, noAplica = 0;
  const bySection = {};
  SECTIONS_DATA.forEach(sec => {
    bySection[sec.letter] = { total: 0, cumple: 0, noCumple: 0, noAplica: 0, sinResp: 0, title: sec.title };
    sec.questions.forEach(q => {
      total++;
      bySection[sec.letter].total++;
      const a = getAnswer(q.id);
      if (a.value === 'cumple') { cumple++; bySection[sec.letter].cumple++; }
      else if (a.value === 'no_cumple') { noCumple++; bySection[sec.letter].noCumple++; }
      else if (a.value === 'no_aplica') { noAplica++; bySection[sec.letter].noAplica++; }
      else { bySection[sec.letter].sinResp++; }
    });
  });
  const evaluadas = cumple + noCumple + noAplica;
  const aplicables = cumple + noCumple;
  const pctCumplimiento = aplicables > 0 ? Math.round((cumple / aplicables) * 100) : 0;
  const pctAvance = total > 0 ? Math.round((evaluadas / total) * 100) : 0;
  return { total, cumple, noCumple, noAplica, evaluadas, aplicables, pctCumplimiento, pctAvance, bySection };
}

// =====================================================
// RENDER · SIDEBAR
// =====================================================
function renderSidebar() {
  const stats = getStats();
  $('#pct-val').textContent = stats.aplicables > 0 ? stats.pctCumplimiento : '—';
  $('#pct-meta').textContent = stats.evaluadas > 0
    ? stats.evaluadas + ' de ' + stats.total + ' evaluadas'
    : 'Sin evaluar';
  $('#pct-bar').style.width = stats.pctAvance + '%';

  const navList = $('#nav-list');
  navList.innerHTML = SECTIONS_DATA.map(sec => {
    const s = stats.bySection[sec.letter];
    const isActive = state.activeSection === sec.letter;
    return `
      <button class="nav-item ${isActive ? 'active' : ''}" data-section="${sec.letter}">
        <span class="nav-letter serif">${sec.letter}</span>
        <span class="nav-title">${escapeHtml(sec.title.length > 42 ? sec.title.substring(0, 42) + '…' : sec.title)}</span>
        <span class="nav-meta">
          <span class="nav-pill ${s.cumple > 0 ? 'ok' : ''}">${s.cumple}</span>
          <span class="nav-pill ${s.noCumple > 0 ? 'no' : ''}">${s.noCumple}</span>
          <span class="nav-pill">${s.total}</span>
        </span>
      </button>
    `;
  }).join('');

  navList.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      state.activeSection = btn.dataset.section;
      state.activeTab = 'evaluacion';
      switchTab('evaluacion');
      renderSidebar();
      renderEvaluacion();
      // scroll al header de sección
      setTimeout(() => {
        const el = document.getElementById('sec-' + btn.dataset.section);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 50);
    });
  });
}

// =====================================================
// TABS
// =====================================================
function switchTab(name) {
  state.activeTab = name;
  $$('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  $$('.tab-content').forEach(c => c.style.display = 'none');
  document.getElementById('tab-' + name).style.display = 'block';
  saveState();
  // Re-render el tab activo para reflejar cambios
  if (name === 'identificacion') renderIdentificacion();
  else if (name === 'evaluacion') renderEvaluacion();
  else if (name === 'resultados') renderResultados();
  else if (name === 'plan') renderPlan();
}

$$('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));

        <input type="text" name="direccionLugar" value="${escapeHtml(id.direccionLugar)}" placeholder="Calle, número, comuna, ciudad">
      </div>
      <div class="field">
        <label>Nombre responsable del CT</label>
        <input type="text" name="responsableCT" value="${escapeHtml(id.responsableCT)}" placeholder="Nombre completo">
      </div>
      <div class="field">
        <label>Cargo</label>
        <input type="text" name="cargoResponsable" value="${escapeHtml(id.cargoResponsable)}" placeholder="Cargo">
      </div>
    </form>
  `;

  // Bind inputs
  $('#id-form').querySelectorAll('input').forEach(input => {
    input.addEventListener('input', (e) => {
      state.identification[e.target.name] = e.target.value;
      saveState();
    });
  });
}

// =====================================================
// RENDER · EVALUACIÓN
// =====================================================
function filterQuestion(q, secLetter) {
  const a = getAnswer(q.id);
  if (state.filter === 'pendientes' && a.value !== null) return false;
  if (state.filter === 'fuf' && !q.isFUF) return false;
  if (state.filter === 'nocumple' && a.value !== 'no_cumple') return false;
  if (state.search) {
    const s = state.search.toLowerCase();
    if (!q.question.toLowerCase().includes(s) &&
        !q.id.toLowerCase().includes(s) &&
        !(q.reference || '').toLowerCase().includes(s)) return false;
  }
  return true;
}

function renderEvaluacion() {
  const container = $('#tab-evaluacion');
  const filterChips = [
    { key: 'all', label: 'Todas' },
    { key: 'pendientes', label: 'Pendientes' },
    { key: 'fuf', label: 'Solo FUF' },
    { key: 'nocumple', label: 'No cumple' }
  ];

  let html = `
    <div class="filters">
      <input type="search" class="search" id="search-input" placeholder="Buscar por número, palabra clave o artículo…" value="${escapeHtml(state.search)}">
      ${filterChips.map(f => `<button class="chip ${state.filter === f.key ? 'active' : ''}" data-filter="${f.key}">${f.label}</button>`).join('')}
    </div>
  `;

  let anyVisible = false;
  SECTIONS_DATA.forEach(sec => {
    const visibleQs = sec.questions.filter(q => filterQuestion(q, sec.letter));
    if (visibleQs.length === 0) return;
    anyVisible = true;

    html += `
      <div id="sec-${sec.letter}" class="section-block">
        <div class="section-header">
          <div class="section-letter serif">${sec.letter}</div>
          <div class="section-title-wrap">
            <div class="section-title serif">${escapeHtml(sec.title)}</div>
            <div class="section-count">${visibleQs.length} pregunta${visibleQs.length !== 1 ? 's' : ''}${visibleQs.length !== sec.questions.length ? ' de ' + sec.questions.length : ''}</div>
          </div>
        </div>
        ${visibleQs.map(q => renderQuestionCard(q)).join('')}
      </div>
    `;
  });

  if (!anyVisible) {
    html += `<div class="empty">No hay preguntas que coincidan con el filtro actual.</div>`;
  }

  container.innerHTML = html;

  // Bind search
  $('#search-input').addEventListener('input', (e) => {
    state.search = e.target.value;
    clearTimeout(window.__searchT);
    window.__searchT = setTimeout(() => renderEvaluacion(), 200);
  });

  // Bind chips
  container.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      state.filter = chip.dataset.filter;
      renderEvaluacion();
    });
  });

  // Bind answer buttons
  container.querySelectorAll('.answer-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.qid;
      const val = btn.dataset.val;
      const curr = getAnswer(id).value;
      setAnswer(id, { value: curr === val ? null : val });
      renderSidebar();
      renderQuestionCardUpdate(id);
    });
  });

  // Bind comment/evidence inputs
  container.querySelectorAll('.comment-field, .evidence-field').forEach(el => {
    el.addEventListener('input', (e) => {
      const id = el.dataset.qid;
      const field = el.dataset.field;
      setAnswer(id, { [field]: e.target.value });
    });
  });

  // Bind toggles de texto largo
  container.querySelectorAll('.q-text-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.previousElementSibling;
      target.classList.toggle('q-text-limit');
      btn.textContent = target.classList.contains('q-text-limit') ? 'Ver más ↓' : 'Ver menos ↑';
    });
  });
}

function renderQuestionCard(q) {
  const a = getAnswer(q.id);
  const ansClass = a.value === 'cumple' ? 'answered-ok' : a.value === 'no_cumple' ? 'answered-no' : a.value === 'no_aplica' ? 'answered-na' : '';
  const ref = q.reference.replace(/^FUF\s*\/\s*/, '');
  const isLong = q.question.length > 280;

  return `
    <div class="question-card ${ansClass}" data-card="${q.id}">
      <div class="q-header">
        <span class="q-id mono">${q.id}</span>
        <div class="q-tags">
          ${q.isFUF ? '<span class="tag fuf">FUF</span>' : ''}
          <span class="tag">${escapeHtml(ref)}</span>
        </div>
      </div>
      <div class="q-text${isLong ? ' q-text-limit' : ''}" data-qid="${q.id}">${escapeHtml(q.question)}</div>
      ${isLong ? '<button class="q-text-toggle">Ver más ↓</button>' : ''}

      <div class="answer-group">
        <button class="answer-btn ${a.value === 'cumple' ? 'selected ok' : ''}" data-qid="${q.id}" data-val="cumple">
          <span class="answer-icon">✓</span> Cumple
        </button>
        <button class="answer-btn ${a.value === 'no_cumple' ? 'selected no' : ''}" data-qid="${q.id}" data-val="no_cumple">
          <span class="answer-icon">✕</span> No cumple
        </button>
        <button class="answer-btn ${a.value === 'no_aplica' ? 'selected na' : ''}" data-qid="${q.id}" data-val="no_aplica">
          <span class="answer-icon">—</span> No aplica
        </button>
      </div>

      <div class="details">
        <div class="detail-row">
          <div class="label">Medida de control</div>
          <div class="value">${escapeHtml(q.control)}</div>
        </div>
        <div class="detail-row">
          <div class="label">Evidencia requerida</div>
          <div class="value">${escapeHtml(q.evidence)}</div>
        </div>
        <div class="detail-row">
          <div class="label">Evidencia aportada</div>
          <div class="value">
            <input type="text" class="evidence-field" data-qid="${q.id}" data-field="evidence" placeholder="Describa documento, URL o respaldo..." value="${escapeHtml(a.evidence)}">
          </div>
        </div>
        <div class="detail-row">
          <div class="label">Comentarios</div>
          <div class="value">
            <textarea class="comment-field" data-qid="${q.id}" data-field="comment" placeholder="Observaciones, motivos (obligatorio si es 'No aplica')...">${escapeHtml(a.comment)}</textarea>
          </div>
        </div>
      </div>
    </div>
  `;
}

// Actualiza solo el borde del card al cambiar respuesta (sin re-renderizar todo)
function renderQuestionCardUpdate(id) {
  const card = document.querySelector('[data-card="' + id + '"]');
  if (!card) return;
  const a = getAnswer(id);
  card.classList.remove('answered-ok', 'answered-no', 'answered-na');
  if (a.value === 'cumple') card.classList.add('answered-ok');
  else if (a.value === 'no_cumple') card.classList.add('answered-no');
  else if (a.value === 'no_aplica') card.classList.add('answered-na');

  card.querySelectorAll('.answer-btn').forEach(btn => {
    btn.classList.remove('selected', 'ok', 'no', 'na');
    if (btn.dataset.val === a.value) {
      const cls = a.value === 'cumple' ? 'ok' : a.value === 'no_cumple' ? 'no' : 'na';
      btn.classList.add('selected', cls);
    }
  });
}

// =====================================================
// RENDER · RESULTADOS
// =====================================================
function renderResultados() {
  const stats = getStats();
  const container = $('#tab-resultados');

  let sectionRows = SECTIONS_DATA.map(sec => {
    const s = stats.bySection[sec.letter];
    const aplicables = s.cumple + s.noCumple;
    const pct = aplicables > 0 ? Math.round((s.cumple / aplicables) * 100) : 0;
    const totalForBar = s.total;
    const okPct = (s.cumple / totalForBar) * 100;
    const noPct = (s.noCumple / totalForBar) * 100;
    const naPct = (s.noAplica / totalForBar) * 100;

    return `
      <div class="chart-row">
        <div>
          <div class="section-code">${sec.letter} · ${s.total}</div>
          <div class="section-name" title="${escapeHtml(sec.title)}">${escapeHtml(sec.title)}</div>
        </div>
        <div class="chart-bar" title="Cumple: ${s.cumple} · No cumple: ${s.noCumple} · No aplica: ${s.noAplica} · Sin responder: ${s.sinResp}">
          ${s.cumple > 0 ? `<div class="chart-bar-seg ok" style="flex:${s.cumple}"></div>` : ''}
          ${s.noCumple > 0 ? `<div class="chart-bar-seg no" style="flex:${s.noCumple}"></div>` : ''}
          ${s.noAplica > 0 ? `<div class="chart-bar-seg na" style="flex:${s.noAplica}"></div>` : ''}
          ${s.sinResp > 0 ? `<div style="flex:${s.sinResp}"></div>` : ''}
        </div>
        <div class="chart-percentage">${aplicables > 0 ? pct + '%' : '—'}</div>
      </div>
    `;
  }).join('');

  container.innerHTML = `
    <div class="results-grid">
      <div class="stat-card">
        <div class="stat-label">Total preguntas</div>
        <div class="stat-value serif">${stats.total}</div>
        <div class="stat-sub">${stats.evaluadas} evaluadas · ${stats.total - stats.evaluadas} pendientes</div>
      </div>
      <div class="stat-card ok">
        <div class="stat-label">Cumple</div>
        <div class="stat-value serif">${stats.cumple}</div>
        <div class="stat-sub">${stats.total > 0 ? Math.round((stats.cumple / stats.total) * 100) : 0}% del total</div>
      </div>
      <div class="stat-card no">
        <div class="stat-label">No cumple</div>
        <div class="stat-value serif">${stats.noCumple}</div>
        <div class="stat-sub">${stats.total > 0 ? Math.round((stats.noCumple / stats.total) * 100) : 0}% del total</div>
      </div>
      <div class="stat-card na">
        <div class="stat-label">No aplica</div>
        <div class="stat-value serif">${stats.noAplica}</div>
        <div class="stat-sub">${stats.total > 0 ? Math.round((stats.noAplica / stats.total) * 100) : 0}% del total</div>
      </div>
    </div>

    <div class="stat-card" style="margin-bottom:24px;">
      <div class="stat-label">Porcentaje de cumplimiento (sobre preguntas aplicables)</div>
      <div style="display:flex; align-items:baseline; gap:14px; margin-top:8px;">
        <div class="stat-value serif" style="font-size:64px; color: var(--accent);">${stats.aplicables > 0 ? stats.pctCumplimiento : '—'}<span style="font-size:24px; opacity:.5;">%</span></div>
        <div style="font-size:13px; color: var(--muted);">
          ${stats.cumple} cumple / ${stats.aplicables} aplicables<br>
          ${stats.noAplica} no aplica · ${stats.total - stats.evaluadas} sin responder
        </div>
      </div>
    </div>

    <div class="section-chart">
      <div class="chart-header">
        <div class="chart-title serif">Cumplimiento por sección</div>
        <div class="chart-legend">
          <span><span class="legend-dot" style="background:var(--ok)"></span>Cumple</span>
          <span><span class="legend-dot" style="background:var(--no)"></span>No cumple</span>
          <span><span class="legend-dot" style="background:var(--na)"></span>No aplica</span>
          <span><span class="legend-dot" style="background:var(--line-soft)"></span>Sin responder</span>
        </div>
      </div>
      ${sectionRows}
    </div>
  `;
}

// =====================================================
// RENDER · PLAN DE ACCIÓN
// =====================================================
function renderPlan() {
  const container = $('#tab-plan');
  const stats = getStats();

  // Preguntas "no cumple"
  const nonCompliant = [];
  SECTIONS_DATA.forEach(sec => {
    sec.questions.forEach(q => {
      const a = getAnswer(q.id);
      if (a.value === 'no_cumple') {
        nonCompliant.push({ ...q, sectionLetter: sec.letter, sectionTitle: sec.title, comment: a.comment });
      }
    });
  });

  if (nonCompliant.length === 0) {
    container.innerHTML = `
      <div class="plan-intro">
        <strong>Sin acciones pendientes.</strong> El plan de acción se genera automáticamente con los ítems marcados como "No cumple" en la pauta de evaluación. Actualmente no hay ítems en este estado.
      </div>
      <div class="empty">Responde la pauta de evaluación para generar tu plan de acción.</div>
    `;
    return;
  }

  container.innerHTML = `
    <div class="plan-intro">
      <strong>${nonCompliant.length} ítem${nonCompliant.length !== 1 ? 's' : ''} requiere${nonCompliant.length === 1 ? '' : 'n'} acción.</strong>
      El plan se genera automáticamente a partir de las preguntas marcadas como "No cumple". Completa los campos editables para planificar la implementación.
    </div>

    <div class="plan-meta">
      <div class="field">
        <label>Fecha de inicio del plan</label>
        <input type="date" class="plan-input" id="plan-inicio" value="${escapeHtml(state.planExtras._inicio || '')}">
      </div>
      <div class="field">
        <label>Responsable del seguimiento</label>
        <input type="text" class="plan-input" id="plan-responsable" placeholder="Nombre y cargo" value="${escapeHtml(state.planExtras._responsable || '')}">
      </div>
    </div>

    <table class="plan-table">
      <thead>
        <tr>
          <th style="width:60px;">Ítem</th>
          <th>Pregunta sin cumplir</th>
          <th style="width:22%;">Medida de control</th>
          <th style="width:130px;">Responsable</th>
          <th style="width:130px;">Fecha impl.</th>
          <th style="width:90px;">Prioridad</th>
        </tr>
      </thead>
      <tbody>
        ${nonCompliant.map(q => {
          const extra = state.planExtras[q.id] || {};
          return `
            <tr>
              <td class="mono" style="font-weight:600;">${q.id}</td>
              <td>
                <div style="font-size:12px; color:var(--muted); margin-bottom:4px;">${q.sectionLetter}. ${escapeHtml(q.sectionTitle)}</div>
                ${escapeHtml(q.question.length > 200 ? q.question.substring(0, 200) + '…' : q.question)}
                ${q.comment ? '<div style="margin-top:6px; padding:6px 8px; background:var(--na-bg); border-radius:2px; font-size:12px; color:var(--ink-soft);"><strong>Comentario:</strong> ' + escapeHtml(q.comment) + '</div>' : ''}
              </td>
              <td style="font-size:12px; color:var(--ink-soft);">${escapeHtml(q.control.length > 180 ? q.control.substring(0, 180) + '…' : q.control)}</td>
              <td>
                <input type="text" class="plan-input" data-pqid="${q.id}" data-pfield="responsable" placeholder="Nombre" value="${escapeHtml(extra.responsable || '')}">
              </td>
              <td>
                <input type="date" class="plan-date" data-pqid="${q.id}" data-pfield="fecha" value="${escapeHtml(extra.fecha || '')}">
              </td>
              <td>
                <select class="plan-select" data-pqid="${q.id}" data-pfield="prioridad">
                  <option value="">—</option>
                  <option value="alta" ${extra.prioridad === 'alta' ? 'selected' : ''}>Alta</option>
                  <option value="media" ${extra.prioridad === 'media' ? 'selected' : ''}>Media</option>
                  <option value="baja" ${extra.prioridad === 'baja' ? 'selected' : ''}>Baja</option>
                </select>
              </td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;

  // Bindings
  $('#plan-inicio').addEventListener('input', (e) => {
    state.planExtras._inicio = e.target.value;
    saveState();
  });
  $('#plan-responsable').addEventListener('input', (e) => {
    state.planExtras._responsable = e.target.value;
    saveState();
  });
  container.querySelectorAll('[data-pqid]').forEach(el => {
    el.addEventListener('input', (e) => {
      const id = el.dataset.pqid;
      const field = el.dataset.pfield;
      if (!state.planExtras[id]) state.planExtras[id] = {};
      state.planExtras[id][field] = e.target.value;
      saveState();
    });
    el.addEventListener('change', (e) => {
      const id = el.dataset.pqid;
      const field = el.dataset.pfield;
      if (!state.planExtras[id]) state.planExtras[id] = {};
      state.planExtras[id][field] = e.target.value;
      saveState();
    });
  });
}

// =====================================================
// EXPORTACIÓN CSV
// =====================================================
function exportCSV() {
  const rows = [];
  rows.push(['Sección', 'ID', 'Pregunta', 'Referencia', 'FUF', 'Cumplimiento', 'Evidencia aportada', 'Comentarios', 'Medida de control', 'Evidencia requerida']);
  SECTIONS_DATA.forEach(sec => {
    sec.questions.forEach(q => {
      const a = getAnswer(q.id);
      const cumplLabel = a.value === 'cumple' ? 'Cumple' : a.value === 'no_cumple' ? 'No cumple' : a.value === 'no_aplica' ? 'No aplica' : '';
      rows.push([
        sec.letter + '. ' + sec.title,
        q.id,
        q.question,
        q.reference,
        q.isFUF ? 'Sí' : 'No',
        cumplLabel,
        a.evidence || '',
        a.comment || '',
        q.control,
        q.evidence
      ]);
    });
  });

  const csv = rows.map(r => r.map(cell => {
    const s = String(cell || '').replace(/"/g, '""');
    return '"' + s + '"';
  }).join(',')).join('\r\n');

  // BOM para Excel UTF-8
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const fecha = state.identification.fecha || new Date().toISOString().slice(0, 10);
  const emp = (state.identification.razonSocial || 'entidad').replace(/[^a-zA-Z0-9]/g, '_').substring(0, 30);
  a.href = url;
  a.download = 'DS44_' + emp + '_' + fecha + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Archivo CSV descargado');
}

// =====================================================
// RESET
// =====================================================
function resetAll() {
  if (!confirm('¿Deseas reiniciar toda la evaluación? Se perderán todas las respuestas y datos ingresados.')) return;
  state = {
    identification: { fecha: '', nombreAplica: '', cargoAplica: '', razonSocial: '', rut: '', direccionEntidad: '', direccionLugar: '', responsableCT: '', cargoResponsable: '' },
    answers: {},
    planExtras: {},
    filter: 'all',
    search: '',
    activeSection: null,
    activeTab: 'identificacion'
  };
  saveState();
  switchTab('identificacion');
  renderSidebar();
  showToast('Evaluación reiniciada');
}

// =====================================================
// INIT
// =====================================================
loadState();
renderSidebar();
switchTab(state.activeTab || 'identificacion');
</script>
